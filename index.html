// ============================================================
// Panel interaction
// ============================================================
function setByPath(obj, path, value) {
  const parts = path.split('.');
  let cur = obj;
  for (let i = 0; i < parts.length - 1; i++) {
    const k = parts[i];
    const idx = Number.isInteger(+k) ? +k : k;
    cur = cur[idx] = cur[idx] || {};
  }
  const last = parts[parts.length - 1];
  cur[Number.isInteger(+last) ? +last : last] = value;
}
function getByPath(obj, path) {
  const parts = path.split('.');
  let cur = obj;
  for (const p of parts) {
    if (cur == null) return undefined;
    cur = cur[Number.isInteger(+p) ? +p : p];
  }
  return cur;
}

let activeImage = null;
const imageInput = document.getElementById('image-input');
imageInput.addEventListener('change', async () => {
  const f = imageInput.files && imageInput.files[0];
  if (!f || !activeImage) return;
  const dataUrl = await readFileAsDataURL(f);
  const { kind, sectionId, key, listKey, index } = activeImage;
  if (kind === 'one') {
    setByPath(state.doc.one, key, dataUrl);
  } else if (kind === 'section') {
    const sec = state.doc.sections.find(s => s.id === sectionId);
    setByPath(sec.data, key, dataUrl);
  } else if (kind === 'scatter') {
    const sec = state.doc.sections.find(s => s.id === sectionId);
    if (sec && sec.data[listKey] && sec.data[listKey][index]) {
      sec.data[listKey][index].image = dataUrl;
    }
  }
  renderPanel();
  renderDocument();
  scheduleSave();
  activeImage = null;
});
function readFileAsDataURL(f) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result); r.onerror = () => rej(r.error);
    r.readAsDataURL(f);
  });
}

function bindPanelEvents() {
  // Theme color
  const tc = document.getElementById('theme-color-input');
  if (tc) tc.addEventListener('input', () => {
    game().themeColor = tc.value;
    applyTheme();
    scheduleSave();
  });

  // Section card collapse
  panelEl.querySelectorAll('.section-card .section-head').forEach(head => {
    head.addEventListener('click', (e) => {
      const btn = e.target.closest('button[data-act]');
      if (btn) return; // handled below
      // Don't toggle when clicking the grip
      if (e.target.classList.contains('grip')) return;
      toggleSectionCollapsed(head.parentElement);
    });
  });

  // Section card action buttons
  panelEl.querySelectorAll('.section-card .section-head button[data-act]').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const act = btn.dataset.act;
      const card = btn.closest('.section-card');
      const id = card.dataset.sectionId;
      if (state.template !== 'product-sheet') return;
      const idx = state.doc.sections.findIndex(s => s.id === id);
      if (idx < 0) return;
      if (act === 'remove') {
        if (!confirm('Remove this section?')) return;
        state.doc.sections.splice(idx, 1);
      } else if (act === 'up' && idx > 0) {
        const [sec] = state.doc.sections.splice(idx, 1);
        state.doc.sections.splice(idx - 1, 0, sec);
      } else if (act === 'down' && idx < state.doc.sections.length - 1) {
        const [sec] = state.doc.sections.splice(idx, 1);
        state.doc.sections.splice(idx + 1, 0, sec);
      } else if (act === 'collapse') {
        toggleSectionCollapsed(card);
        return;
      } else return;
      renderPanel();
      renderDocument();
      scheduleSave();
    });
  });

  // Add section bar
  const addBar = document.getElementById('add-section-bar');
  if (addBar) {
    document.getElementById('add-section-btn').addEventListener('click', (e) => {
      e.stopPropagation();
      addBar.classList.toggle('open');
    });
    addBar.querySelectorAll('button[data-add-section]').forEach(b => {
      b.addEventListener('click', () => {
        const type = b.dataset.addSection;
        const data = SECTION_TYPES[type].default(game(), WEBSITE_SEED[game().key] || {});
        state.doc.sections.push({ id: genId(), type, data });
        addBar.classList.remove('open');
        renderPanel();
        renderDocument();
        scheduleSave();
      });
    });
  }

  // Text inputs on sections
  panelEl.querySelectorAll('.section-card .section-body input[type=text]:not([data-bullet-i]):not([data-idsheader-i]):not([data-rtp-field]):not([data-bullet-x]), .section-card .section-body textarea').forEach(input => {
    input.addEventListener('input', () => {
      const card = input.closest('.section-card');
      const sectionId = card.dataset.sectionId;
      const path = input.dataset.key;
      if (!path) return;
      if (state.template === 'one-pager') {
        setByPath(state.doc.one, path, input.value);
      } else {
        const sec = state.doc.sections.find(s => s.id === sectionId);
        if (!sec) return;
        // path can be: "field", or "item.<i>.<field>"
        if (path.startsWith('item.')) {
          // The list field key is on the wrapping data-list - we need to look up the field
          const listEl = input.closest('[data-list]');
          const listKey = listEl ? listEl.dataset.list : null;
          if (!listKey) return;
          const [, idx, ...rest] = path.split('.');
          const items = sec.data[listKey] || [];
          if (!items[idx]) items[idx] = {};
          items[idx][rest.join('.')] = input.value;
        } else {
          setByPath(sec.data, path, input.value);
        }
      }
      renderDocument();
      scheduleSave();
    });
  });

  // Image upload triggers
  panelEl.querySelectorAll('button[data-img-upload]').forEach(b => {
    b.addEventListener('click', () => {
      const key = b.dataset.imgUpload;
      const card = b.closest('.section-card');
      // Translate item.<i>.<field> to the actual data path
      let resolved = { kind: state.template === 'one-pager' ? 'one' : 'section', sectionId: card.dataset.sectionId, key };
      if (key.startsWith('item.')) {
        const listEl = b.closest('[data-list]');
        const listKey = listEl ? listEl.dataset.list : null;
        if (listKey) {
          const [, idx, ...rest] = key.split('.');
          resolved.key = `${listKey}.${idx}.${rest.join('.')}`;
        }
      }
      activeImage = resolved;
      imageInput.value = '';
      imageInput.click();
    });
  });
  panelEl.querySelectorAll('button[data-img-clear]').forEach(b => {
    b.addEventListener('click', () => {
      const key = b.dataset.imgClear;
      const card = b.closest('.section-card');
      let path = key;
      if (key.startsWith('item.')) {
        const listEl = b.closest('[data-list]');
        const listKey = listEl ? listEl.dataset.list : null;
        if (listKey) {
          const [, idx, ...rest] = key.split('.');
          path = `${listKey}.${idx}.${rest.join('.')}`;
        }
      }
      if (state.template === 'one-pager') setByPath(state.doc.one, path, null);
      else setByPath(state.doc.sections.find(s => s.id === card.dataset.sectionId).data, path, null);
      renderPanel(); renderDocument(); scheduleSave();
    });
  });

  // Bullets
  panelEl.querySelectorAll('[data-bullets]').forEach(wrap => {
    const card = wrap.closest('.section-card');
    const sec = card ? state.doc.sections.find(s => s.id === card.dataset.sectionId) : null;
    if (!sec) return;
    const key = wrap.dataset.bullets;
    wrap.querySelectorAll('input[data-bullet-i]').forEach(inp => {
      inp.addEventListener('input', () => {
        const i = +inp.dataset.bulletI;
        sec.data[key][i] = inp.value;
        renderDocument(); scheduleSave();
      });
    });
    wrap.querySelectorAll('button[data-bullet-x]').forEach(btn => {
      btn.addEventListener('click', () => {
        const i = +btn.dataset.bulletX;
        sec.data[key].splice(i, 1);
        renderPanel(); renderDocument(); scheduleSave();
      });
    });
    const addBtn = wrap.querySelector('button[data-bullet-add]');
    if (addBtn) addBtn.addEventListener('click', () => {
      sec.data[key].push('New bullet');
      renderPanel(); renderDocument(); scheduleSave();
    });
  });

  // IDs headers
  panelEl.querySelectorAll('input[data-idsheader-i]').forEach(inp => {
    inp.addEventListener('input', () => {
      const card = inp.closest('.section-card');
      const sec = state.doc.sections.find(s => s.id === card.dataset.sectionId);
      if (!sec) return;
      const i = +inp.dataset.idsheaderI;
      sec.data.idsHeaders = sec.data.idsHeaders || [];
      sec.data.idsHeaders[i] = inp.value;
      renderDocument(); scheduleSave();
    });
  });

  // RTP rows
  panelEl.querySelectorAll('[data-rtprows]').forEach(wrap => {
    const card = wrap.closest('.section-card');
    const sec = state.doc.sections.find(s => s.id === card.dataset.sectionId);
    if (!sec) return;
    wrap.querySelectorAll('.rtp-row-edit').forEach(row => {
      const i = +row.dataset.rtpI;
      row.querySelectorAll('input[data-rtp-field]').forEach(inp => {
        inp.addEventListener('input', () => {
          sec.data.rtpRows[i] = sec.data.rtpRows[i] || { label: '', values: ['','','',''] };
          if (inp.dataset.rtpField === 'label') sec.data.rtpRows[i].label = inp.value;
          else {
            const j = +inp.dataset.rtpVj;
            sec.data.rtpRows[i].values = sec.data.rtpRows[i].values || ['','','',''];
            sec.data.rtpRows[i].values[j] = inp.value;
          }
          renderDocument(); scheduleSave();
        });
      });
      const xb = row.querySelector('button[data-rtp-remove]');
      if (xb) xb.addEventListener('click', () => {
        sec.data.rtpRows.splice(i, 1);
        renderPanel(); renderDocument(); scheduleSave();
      });
    });
    const addB = wrap.querySelector('button[data-rtp-add]');
    if (addB) addB.addEventListener('click', () => {
      sec.data.rtpRows.push({ label: 'New row', values: ['','','',''] });
      renderPanel(); renderDocument(); scheduleSave();
    });
  });

  // List item add/remove/move
  panelEl.querySelectorAll('[data-list]').forEach(list => {
    const card = list.closest('.section-card');
    const sec = state.doc.sections.find(s => s.id === card.dataset.sectionId);
    if (!sec) return;
    const key = list.dataset.list;
    const itemFields = JSON.parse(list.dataset.itemFields);
    list.querySelectorAll('button[data-item-act]').forEach(btn => {
      btn.addEventListener('click', () => {
        const act = btn.dataset.itemAct;
        const i = +btn.dataset.itemI;
        const arr = sec.data[key];
        if (act === 'remove') {
          if (!confirm('Remove this item?')) return;
          arr.splice(i, 1);
        } else if (act === 'up' && i > 0) {
          const [x] = arr.splice(i, 1);
          arr.splice(i - 1, 0, x);
        } else if (act === 'down' && i < arr.length - 1) {
          const [x] = arr.splice(i, 1);
          arr.splice(i + 1, 0, x);
        } else return;
        renderPanel(); renderDocument(); scheduleSave();
      });
    });
    const addB = list.querySelector('button[data-list-add]');
    if (addB) addB.addEventListener('click', () => {
      const newItem = {};
      for (const f of itemFields) newItem[f.key] = f.type === 'image' ? null : '';
      const defaults = SECTION_TYPES[sec.type].fields.find(f => f.key === key);
      const created = defaults && defaults.itemDefault ? defaults.itemDefault() : newItem;
      sec.data[key] = sec.data[key] || [];
      sec.data[key].push(created);
      renderPanel(); renderDocument(); scheduleSave();
    });
  });

  // Scatter assets
  panelEl.querySelectorAll('[data-scatter]').forEach(wrap => {
    const card = wrap.closest('.section-card');
    const sec = card ? state.doc.sections.find(s => s.id === card.dataset.sectionId) : null;
    if (!sec) return;
    const key = wrap.dataset.scatter;
    if (!Array.isArray(sec.data[key])) sec.data[key] = [];
    const arr = sec.data[key];
    // Image upload
    wrap.querySelectorAll('[data-scatter-upload]').forEach(pad => {
      pad.addEventListener('click', () => {
        const i = +pad.dataset.scatterUpload;
        activeImage = { kind: 'scatter', sectionId: card.dataset.sectionId, listKey: key, index: i };
        imageInput.value = ''; imageInput.click();
      });
    });
    // Field inputs
    wrap.querySelectorAll('input[data-scatter-field]').forEach(inp => {
      inp.addEventListener('input', () => {
        const i = +inp.dataset.si;
        const field = inp.dataset.scatterField;
        const v = inp.value === '' ? 0 : Number(inp.value);
        if (!arr[i]) return;
        arr[i][field] = v;
        renderDocument(); scheduleSave();
      });
    });
    // Remove
    wrap.querySelectorAll('button[data-scatter-remove]').forEach(b => {
      b.addEventListener('click', () => {
        const i = +b.dataset.scatterRemove;
        arr.splice(i, 1);
        renderPanel(); renderDocument(); scheduleSave();
      });
    });
    // Default placement presets used by both library-add and custom-add
    const PRESETS = [
      { x: 80, y: 85 }, { x: 20, y: 85 }, { x: 85, y: 50 }, { x: 15, y: 50 },
      { x: 50, y: 92 }, { x: 35, y: 78 }, { x: 65, y: 78 },
    ];
    // Library quick-add buttons
    wrap.querySelectorAll('button[data-scatter-lib]').forEach(b => {
      b.addEventListener('click', () => {
        const path = b.dataset.scatterLib;
        const p = PRESETS[arr.length % PRESETS.length];
        const rot = Math.round(((Math.random() * 30) - 15) / 5) * 5;
        arr.push({ image: path, x: p.x, y: p.y, size: 35, rotation: rot });
        renderPanel(); renderDocument(); scheduleSave();
      });
    });
    // Custom upload add
    const addBtn = wrap.querySelector('button[data-scatter-add]');
    if (addBtn) addBtn.addEventListener('click', () => {
      const p = PRESETS[arr.length % PRESETS.length];
      arr.push({ image: null, x: p.x, y: p.y, size: 35, rotation: 0 });
      renderPanel(); renderDocument(); scheduleSave();
    });
  });

  // Drag-and-drop section reordering
  bindDragSections();
}

function bindDragSections() {
  if (state.template !== 'product-sheet') return;
  let dragId = null;
  panelEl.querySelectorAll('.section-card[draggable]').forEach(card => {
    card.addEventListener('dragstart', (e) => {
      dragId = card.dataset.sectionId;
      card.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });
    card.addEventListener('dragend', () => {
      card.classList.remove('dragging');
      panelEl.querySelectorAll('.drop-target').forEach(c => c.classList.remove('drop-target'));
    });
    card.addEventListener('dragover', (e) => {
      e.preventDefault();
      if (card.dataset.sectionId !== dragId) card.classList.add('drop-target');
    });
    card.addEventListener('dragleave', () => card.classList.remove('drop-target'));
    card.addEventListener('drop', (e) => {
      e.preventDefault();
      card.classList.remove('drop-target');
      const targetId = card.dataset.sectionId;
      if (!dragId || dragId === targetId) return;
      const arr = state.doc.sections;
      const from = arr.findIndex(s => s.id === dragId);
      const to = arr.findIndex(s => s.id === targetId);
      if (from < 0 || to < 0) return;
      const [moved] = arr.splice(from, 1);
      arr.splice(to, 0, moved);
      renderPanel(); renderDocument(); scheduleSave();
    });
  });
}

// ============================================================
// Toolbar wiring
// ============================================================
function renderGameSwitcher() {
  const el = document.getElementById('game-switcher');
  const grouped = {};
  for (const g of GAMES) (grouped[g.category] = grouped[g.category] || []).push(g);
  el.innerHTML = `
    <div class="gs-header">
      <img class="light" src="logotype-white.png" alt="Solidicon">
      <img class="dark"  src="logotype-black.png" alt="Solidicon">
    </div>
    <div class="gs-template-tabs">
      <button data-tpl="product-sheet" class="${state.template === 'product-sheet' ? 'active' : ''}">Sheet</button>
      <button data-tpl="one-pager"     class="${state.template === 'one-pager'     ? 'active' : ''}">1-Pager</button>
      <button data-tpl="matrix"        class="${state.template === 'matrix'        ? 'active' : ''}">Matrix</button>
    </div>
    ${Object.entries(grouped).map(([cat, list]) => `
      <div class="gs-group-title">${escapeHTML(cat)}</div>
      ${list.map(g => `
        <div class="gs-game ${g.key === state.gameKey ? 'active' : ''}"
             data-game="${escapeAttr(g.key)}"
             style="--gs-active:${g.themeColor}">
          <img src="${escapeAttr(imageFor(g.key))}" alt="">
          <div class="name">${escapeHTML(g.name)}</div>
        </div>`).join('')}
    `).join('')}
  `;
  el.querySelectorAll('.gs-game').forEach(row => {
    row.addEventListener('click', async () => {
      if (row.dataset.game === state.gameKey) return;
      state.gameKey = row.dataset.game;
      localStorage.setItem('sheets:gameKey', state.gameKey);
      const sel = document.getElementById('game-select');
      if (sel) sel.value = state.gameKey;
      expandedSections.clear();
      if (state.template !== 'matrix') await loadDoc();
      renderPanel(); renderDocument(); renderGameSwitcher();
    });
  });
  el.querySelectorAll('.gs-template-tabs button').forEach(b => {
    b.addEventListener('click', async () => {
      if (b.dataset.tpl === state.template) return;
      state.template = b.dataset.tpl;
      localStorage.setItem('sheets:template', state.template);
      notifyParentTemplate(state.template);
      document.querySelectorAll('#template-tabs button').forEach(x => x.classList.toggle('active', x.dataset.template === state.template));
      expandedSections.clear();
      if (state.template !== 'matrix') await loadDoc();
      renderPanel(); renderDocument(); renderGameSwitcher();
    });
  });
}

function populateGames() {
  const sel = document.getElementById('game-select');
  const grouped = {};
  for (const g of GAMES) (grouped[g.category] = grouped[g.category] || []).push(g);
  sel.innerHTML = '';
  for (const [cat, list] of Object.entries(grouped)) {
    const og = document.createElement('optgroup');
    og.label = cat;
    for (const g of list) {
      const o = document.createElement('option');
      o.value = g.key; o.textContent = g.name;
      og.appendChild(o);
    }
    sel.appendChild(og);
  }
  sel.value = state.gameKey;
  sel.addEventListener('change', async () => {
    state.gameKey = sel.value;
    localStorage.setItem('sheets:gameKey', state.gameKey);
    expandedSections.clear();
    await loadDoc(); renderPanel(); renderDocument(); renderGameSwitcher();
  });
}

// Inform the embedding parent (marketing's Info Sheets tab) whenever the
// template changes, so it can update its hash route to match. Hash format:
// #info-sheets/sheet, /1pager, /matrix.
function notifyParentTemplate(template) {
  try {
    if (window.parent && window.parent !== window) {
      window.parent.postMessage({ type: 'productSheetsTemplate', token: TOKEN_FROM_TEMPLATE[template] || template }, '*');
    }
  } catch {}
}

// Inbound: parent tells us to switch template (after a hash change in
// marketing). We update state without a full iframe reload, preserving IDB
// state, edited cells in matrix, scroll position, etc.
window.addEventListener('message', async (e) => {
  const m = e.data;
  if (!m || m.type !== 'setProductSheetsTemplate') return;
  const next = TEMPLATE_FROM_TOKEN[m.token] || m.token;
  if (!next || next === state.template) return;
  state.template = next;
  localStorage.setItem('sheets:template', next);
  document.querySelectorAll('#template-tabs button').forEach(x => x.classList.toggle('active', x.dataset.template === next));
  if (next !== 'matrix') await loadDoc();
  renderPanel(); renderDocument(); renderGameSwitcher();
});

document.getElementById('template-tabs').addEventListener('click', async (e) => {
  const b = e.target.closest('button'); if (!b) return;
  state.template = b.dataset.template;
  localStorage.setItem('sheets:template', state.template);
  notifyParentTemplate(state.template);
  document.querySelectorAll('#template-tabs button').forEach(x => x.classList.toggle('active', x === b));
  expandedSections.clear();
  if (state.template !== 'matrix') await loadDoc();
  renderPanel(); renderDocument(); renderGameSwitcher();
});

document.getElementById('mode-tabs').addEventListener('click', (e) => {
  const b = e.target.closest('button'); if (!b) return;
  state.mode = b.dataset.mode;
  document.body.classList.toggle('mode-edit', state.mode === 'edit');
  document.body.classList.toggle('mode-view', state.mode === 'view');
  document.querySelectorAll('#mode-tabs button').forEach(x => x.classList.toggle('active', x === b));
});

document.getElementById('export-btn').addEventListener('click', () => {
  const prev = state.mode;
  document.body.classList.add('mode-view');
  document.body.classList.remove('mode-edit');
  setTimeout(() => {
    window.print();
    if (prev === 'edit') {
      document.body.classList.add('mode-edit');
      document.body.classList.remove('mode-view');
    }
  }, 50);
});

function download(filename, content, mime) {
  const blob = new Blob([content], { type: mime || 'application/octet-stream' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 50);
}

// Bulk import: read PNGs out of a folder, match `<gameKey>-<viewport>.png`,
// and stuff each into every matching game's product-sheet `devices` section.
// Designed for the multiview tool's screenshot dump (mobile/tablet/desktop).
async function importDeviceImages() {
  if (!window.showDirectoryPicker) {
    setStatus('This browser does not support folder picking. Use Chrome/Edge.', 'error');
    return;
  }
  let dir;
  try {
    dir = await window.showDirectoryPicker({ mode: 'read', id: 'mv-screenshots' });
  } catch (err) {
    if (err && err.name === 'AbortError') return;
    setStatus('Folder open failed: ' + err.message, 'error');
    return;
  }
  setStatus('Reading folder…', '');
  // Collect found.<gameKey>.<viewport> = data URL
  const found = {};
  for await (const entry of dir.values()) {
    if (entry.kind !== 'file' || !/\.png$/i.test(entry.name)) continue;
    const stem = entry.name.replace(/\.png$/i, '');
    const m = stem.match(/^(.+)-(mobile|tablet|desktop)$/i);
    if (!m) continue;
    const key = m[1];
    const vp = m[2].toLowerCase();
    if (!GAMES.find(g => g.key === key)) continue;
    const file = await entry.getFile();
    const dataUrl = await new Promise((res, rej) => {
      const r = new FileReader();
      r.onload = () => res(r.result);
      r.onerror = () => rej(r.error);
      r.readAsDataURL(file);
    });
    (found[key] = found[key] || {})[vp] = dataUrl;
  }
  const keys = Object.keys(found);
  if (keys.length === 0) {
    setStatus('No matching <gameKey>-<viewport>.png files in that folder.', 'error');
    return;
  }
  let updatedGames = 0;
  let updatedImages = 0;
  for (const key of keys) {
    const dKey = `${key}::product-sheet`;
    let doc = await dbGet(dKey);
    if (!doc) {
      const g = GAMES.find(g => g.key === key);
      if (!g) continue;
      doc = buildDefaultDoc(g, 'product-sheet');
    }
    if (!Array.isArray(doc.sections)) continue;
    let dev = doc.sections.find(s => s.type === 'devices');
    if (!dev) {
      dev = { id: `devices-${Date.now()}-${Math.random().toString(36).slice(2, 6)}`, type: 'devices', data: SECTION_TYPES.devices.default() };
      doc.sections.push(dev);
    }
    for (const vp of ['mobile', 'tablet', 'desktop']) {
      if (found[key][vp]) {
        dev.data[vp + 'Image'] = found[key][vp];
        updatedImages++;
      }
    }
    doc.updated = Date.now();
    await dbSet(dKey, doc);
    updatedGames++;
    // Refresh in-memory state if this is the currently-viewed sheet
    if (key === state.gameKey && state.template === 'product-sheet') {
      state.doc = doc;
    }
  }
  if (state.template === 'product-sheet') {
    renderPanel();
    renderDocument();
  }
  setStatus(`✓ Imported ${updatedImages} images across ${updatedGames} games`, 'saved');
}

document.getElementById('data-menu').addEventListener('click', async (e) => {
  const b = e.target.closest('button[data-act]'); if (!b) return;
  const act = b.dataset.act;
  document.getElementById('data-menu').open = false;
  try {
    if (act === 'customer-preview') {
      const u = new URL(location.href);
      u.searchParams.delete('edit');
      u.searchParams.set('game', state.gameKey);
      u.searchParams.set('template', state.template);
      u.hash = '';
      window.open(u.toString(), '_blank');
    } else if (act === 'copy-customer-url') {
      const u = new URL(location.href);
      u.searchParams.delete('edit');
      u.searchParams.set('game', state.gameKey);
      u.searchParams.set('template', state.template);
      u.hash = '';
      try { await navigator.clipboard.writeText(u.toString()); setStatus('Customer URL copied', 'saved'); }
      catch { prompt('Copy this URL:', u.toString()); }
    } else if (act === 'export-current') {
      if (state.template === 'matrix') {
        await loadMatrixOverrides();
        const payload = { template: 'matrix', overrides: matrixOverrides || {}, exported: new Date().toISOString() };
        download(`matrix-overrides.json`, JSON.stringify(payload, null, 2), 'application/json');
      } else {
        const payload = { gameKey: state.gameKey, template: state.template, themeColor: game().themeColor, doc: state.doc };
        download(`${state.gameKey}-${state.template}.json`, JSON.stringify(payload, null, 2), 'application/json');
      }
    } else if (act === 'import-current') {
      jsonInput.value = ''; jsonInput.click();
    } else if (act === 'import-device-images') {
      await importDeviceImages();
    } else if (act === 'reset-to-default') {
      if (!confirm('Reset this sheet to the category default? Local edits will be lost.')) return;
      await dbDel(docKey());
      await loadDoc(); renderPanel(); renderDocument();
    } else if (act === 'export-all') {
      const all = await dbAll();
      const js = `// Auto-generated by Solidicon Product Sheets. Check this file in.
// Loaded at startup as a fallback when IndexedDB has no entry for a (game, template) key.
window.SOLIDICON_SHEETS_SEED = ${JSON.stringify(all, null, 2)};
`;
      download('seed-data.js', js, 'application/javascript');
      setStatus(`Baked ${Object.keys(all).length} entries → seed-data.js`, 'saved');
    } else if (act === 'wipe-all') {
      if (!confirm('Wipe ALL local edits for ALL games and templates? This cannot be undone.')) return;
      const keys = await dbKeys();
      for (const k of keys) await dbDel(k);
      await loadDoc(); renderPanel(); renderDocument();
    }
  } catch (err) {
    setStatus('Error: ' + err.message, 'error');
  }
});

const jsonInput = document.getElementById('json-input');
jsonInput.addEventListener('change', async () => {
  const f = jsonInput.files && jsonInput.files[0];
  if (!f) return;
  try {
    const text = await f.text();
    const data = JSON.parse(text);
    // Matrix overrides file shape: { template: 'matrix', overrides: { gameKey: { field: value } } }
    if (data && (data.template === 'matrix' || data.overrides)) {
      await loadMatrixOverrides();
      const incoming = data.overrides || {};
      const mode = confirm(
        `Import matrix overrides for ${Object.keys(incoming).length} games?\n\n` +
        `OK = MERGE (your edits kept, incoming wins on conflict)\n` +
        `Cancel = REPLACE (your local overrides wiped)`
      );
      if (mode) {
        matrixOverrides = matrixOverrides || {};
        for (const [k, fields] of Object.entries(incoming)) {
          matrixOverrides[k] = { ...(matrixOverrides[k] || {}), ...fields };
        }
      } else {
        matrixOverrides = JSON.parse(JSON.stringify(incoming));
      }
      await saveMatrixOverrides();
      if (state.template === 'matrix') renderDocument();
      setStatus(`Imported matrix overrides (${Object.keys(incoming).length} games)`, 'saved');
      return;
    }
    if (!data || !data.doc) throw new Error('JSON missing required `doc` field');
    if (data.gameKey && data.template && (data.gameKey !== state.gameKey || data.template !== state.template)) {
      if (!confirm(`File is for ${data.gameKey} / ${data.template}. Apply to current sheet (${state.gameKey} / ${state.template}) anyway?`)) return;
    }
    if (data.themeColor) game().themeColor = data.themeColor;
    state.doc = data.doc;
    await dbSet(docKey(), { ...state.doc, themeColor: game().themeColor, updated: Date.now() });
    renderPanel(); renderDocument();
    setStatus('Imported from JSON', 'saved');
  } catch (err) {
    setStatus('Import error: ' + err.message, 'error');
  }
});

// ============================================================
// Boot
// ============================================================
function loadSeedFile() {
  return new Promise(resolve => {
    const s = document.createElement('script');
    s.src = 'seed-data.js';
    s.onload = () => resolve(true);
    s.onerror = () => resolve(false);
    document.head.appendChild(s);
  });
}

// Global outside-click closes add-section pop
document.addEventListener('click', (e) => {
  const addBar = document.getElementById('add-section-bar');
  if (addBar && addBar.classList.contains('open') && !addBar.contains(e.target)) {
    addBar.classList.remove('open');
  }
});

// Print FAB (customer mode)
document.getElementById('print-fab').addEventListener('click', () => {
  window.print();
});

(async () => {
  // Initial mode based on URL: ?edit (or #edit) → editor, otherwise customer view
  if (IS_EDIT_URL) {
    document.body.classList.add('mode-edit');
    document.body.classList.remove('mode-customer');
  } else {
    document.body.classList.add('mode-customer');
    document.body.classList.remove('mode-edit');
  }
  applyScatterFieldToAll();
  await loadSeedFile();
  populateGames();
  // Matrix is the source of truth for game-info — load overrides BEFORE any
  // section render so cover/infoSheet/one-pager all start with merged values.
  await loadMatrixOverrides();
  if (state.template !== 'matrix') await loadDoc();
  renderPanel();
  renderDocument();
  renderGameSwitcher();
})();
</script>
