<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Solidicon Product Sheets</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bai+Jamjuree:wght@400;500;600;700&family=Kanit:wght@500;600;700&family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@400;500;600;700&display=swap">
<style>
  :root {
    --bg: #070d16;
    --bg-2: #0e1622;
    --bg-3: #131e2d;
    --fg: #fdfdfe;
    --muted: #91919c;
    --border: rgba(208,242,255,0.09);
    --border-2: rgba(208,242,255,0.16);
    --card: rgba(255,255,255,0.025);
    --card-hover: rgba(0,172,203,0.06);
    --accent: #00accb;
    --accent-bright: #00d6fc;
    --accent-deep: #005e70;
    --warm: #f65221;

    --doc-fg: #1a1a1a;
    --doc-muted: #555;

    --theme: #00accb;
    --theme-fg: #ffffff;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; height: 100%;
    background: var(--bg); color: var(--fg);
    font: 13px/1.4 'Bai Jamjuree', -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  * { scrollbar-width: thin; scrollbar-color: rgba(0,172,203,0.45) transparent; }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb {
    background: linear-gradient(180deg, rgba(0,172,203,0.55), rgba(0,94,112,0.55));
    border-radius: 999px;
  }
  ::-webkit-scrollbar-thumb:hover { background: linear-gradient(180deg, rgba(0,214,252,0.85), rgba(0,172,203,0.85)); }

  .app { display: flex; flex-direction: column; height: 100vh; min-height: 0; }

  /* ----- Toolbar ----- */
  .toolbar {
    display: flex; align-items: center; gap: 10px;
    background: linear-gradient(180deg, #050a12 0%, var(--bg) 100%);
    border-bottom: 1px solid var(--border);
    padding: 10px 16px;
    flex-shrink: 0;
    flex-wrap: wrap;
  }
  .toolbar .brand { display:flex; align-items:center; gap:.55rem; padding-right: 14px; border-right:1px solid var(--border); }
  /* When loaded inside the marketing app's iframe (?embedded=1), the parent
     already shows the Solidicon brand in its tab-bar — hide ours to avoid
     visual duplication. */
  html.embedded .toolbar .brand { display: none; }
  /* The "Add ?edit to the URL" customer-mode hint doesn't apply in the
     embedded view — edit mode there is toggled via marketing's dev-toggle dot. */
  html.embedded .edit-hint { display: none !important; }

  /* Embedded + view mode: match the marketing app's dark chrome (the white
     A4 sheets inside .pages stay white because they're paper). The game
     switcher and preview surround go dark, with light text. */
  html.embedded body.mode-customer {
    background: #070d16;
  }
  html.embedded body.mode-customer .game-switcher {
    background: #070d16;
    border-right-color: rgba(255,255,255,0.08);
    color: #e6eaf2;
  }
  html.embedded body.mode-customer .gs-header { display: none; }
  html.embedded body.mode-customer .gs-template-tabs button {
    background: rgba(255,255,255,0.04);
    color: #b6bcc8;
    border-color: rgba(255,255,255,0.08);
  }
  html.embedded body.mode-customer .gs-template-tabs button:hover { color: #fff; }
  html.embedded body.mode-customer .gs-template-tabs button.active {
    background: #00d6fc; color: #001218; border-color: #00d6fc;
  }
  html.embedded body.mode-customer .gs-group-title { color: #8b95a4; }
  html.embedded body.mode-customer .gs-game:hover { background: rgba(255,255,255,0.04); }
  html.embedded body.mode-customer .gs-game.active { background: rgba(0,214,252,0.10); }
  html.embedded body.mode-customer .gs-game .name { color: #f3f5f9; }
  html.embedded body.mode-customer .preview-stage {
    background: #070d16;
  }
  .toolbar .brand img { height: 18px; }
  .toolbar .brand b { font: 600 11px/1 'Kanit'; letter-spacing:.22em; text-transform: uppercase; color: var(--fg); }
  .toolbar .brand small { font: 500 9px/1 'Kanit'; letter-spacing:.22em; text-transform: uppercase; color: var(--accent); }

  .tab-group { display: flex; gap: 0; background: var(--card); border: 1px solid var(--border); border-radius: 999px; padding: 3px; }
  .tab-group button {
    background: transparent; border: 0; color: var(--muted);
    padding: 7px 13px; cursor: pointer; border-radius: 999px;
    font: 600 10.5px/1 'Kanit'; letter-spacing:.18em; text-transform: uppercase;
    transition: color .15s, background .15s;
  }
  .tab-group button:hover { color: var(--fg); }
  .tab-group button.active { background: linear-gradient(180deg, var(--accent), var(--accent-deep)); color: #001218; }

  .toolbar select, .toolbar .btn {
    background: var(--card); color: var(--fg); border: 1px solid var(--border);
    padding: 7px 11px; border-radius: 6px;
    font: 500 10.5px/1 'Kanit'; letter-spacing:.14em; text-transform: uppercase;
    cursor: pointer;
  }
  .toolbar select:hover, .toolbar .btn:hover { border-color: rgba(0,172,203,0.4); color: var(--accent-bright); }
  .toolbar .btn.primary {
    background: linear-gradient(180deg, var(--warm) 0%, #c0391b 100%);
    border-color: transparent; color: #fff;
  }
  .toolbar .btn.primary:hover { color: #fff; filter: brightness(1.08); }
  .toolbar .spacer { flex: 1; }

  .toolbar .status { font: 500 10px/1 'Kanit'; letter-spacing:.18em; text-transform: uppercase; color: var(--muted); padding: 0 8px; }
  .toolbar .status.saved { color: var(--accent); }
  .toolbar .status.error { color: var(--warm); }

  details.menu { position: relative; }
  details.menu > summary {
    list-style: none; cursor: pointer;
    background: var(--card); color: var(--fg); border: 1px solid var(--border);
    padding: 7px 11px; border-radius: 6px;
    font: 500 10.5px/1 'Kanit'; letter-spacing:.14em; text-transform: uppercase;
  }
  details.menu > summary::-webkit-details-marker { display: none; }
  details.menu > summary:hover { border-color: rgba(0,172,203,0.4); color: var(--accent-bright); }
  details.menu .menu-pop {
    position: absolute; top: calc(100% + 4px); right: 0; z-index: 100;
    background: var(--bg-2); border: 1px solid var(--border); border-radius: 8px;
    padding: 6px; min-width: 220px;
    display: flex; flex-direction: column;
    box-shadow: 0 8px 30px rgba(0,0,0,0.6);
  }
  details.menu .menu-pop button {
    background: transparent; border: 0; color: var(--fg);
    text-align: left; padding: 8px 12px; border-radius: 5px; cursor: pointer;
    font: 500 11px/1.2 'Kanit'; letter-spacing:.1em; text-transform: uppercase;
  }
  details.menu .menu-pop button:hover { background: var(--card-hover); color: var(--accent-bright); }

  /* ----- Split stage: panel + switcher + preview (flex) ----- */
  .split-stage {
    flex: 1; min-height: 0; min-width: 0;
    display: flex;
  }
  body.mode-view .config-panel,
  body.mode-customer .config-panel { display: none !important; }

  /* Game switcher (visible in View + Customer modes; hidden in Edit) */
  .game-switcher {
    width: 230px; flex-shrink: 0;
    background: var(--bg-2);
    border-right: 1px solid var(--border-2);
    overflow-y: auto;
    padding: 12px 10px 16px;
    display: none;
    flex-direction: column;
    gap: 6px;
  }
  body.mode-view .game-switcher,
  body.mode-customer .game-switcher { display: flex; }
  body.mode-customer .game-switcher {
    background: #fafaf7;
    border-right: 1px solid #d8d4cb;
    color: #111;
  }

  .gs-header {
    padding: 4px 8px 12px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px;
  }
  body.mode-customer .gs-header { border-bottom-color: #e5e0d3; }
  .gs-header img { height: 18px; }
  .gs-header img.dark { display: none; }
  .gs-header img.light { display: inline; }
  body.mode-customer .gs-header img.dark { display: inline; }
  body.mode-customer .gs-header img.light { display: none; }

  .gs-template-tabs {
    display: flex; gap: 4px;
    padding: 8px 4px 4px;
  }
  .gs-template-tabs button {
    flex: 1;
    background: var(--card); color: var(--muted); border: 1px solid var(--border);
    padding: 5px 8px; border-radius: 4px; cursor: pointer;
    font: 600 9.5px/1 'Kanit'; letter-spacing: .14em; text-transform: uppercase;
  }
  .gs-template-tabs button:hover { color: var(--fg); }
  .gs-template-tabs button.active {
    background: var(--accent); color: #001218; border-color: var(--accent);
  }
  body.mode-customer .gs-template-tabs button {
    background: #fff; color: #777; border-color: #e0dbcd;
  }
  body.mode-customer .gs-template-tabs button:hover { color: #111; }
  body.mode-customer .gs-template-tabs button.active {
    background: #111; color: #fff; border-color: #111;
  }

  .gs-group-title {
    font: 700 9px/1 'Kanit'; letter-spacing:.2em; text-transform: uppercase;
    color: var(--muted);
    padding: 12px 8px 4px;
  }
  body.mode-customer .gs-group-title { color: #888; }

  .gs-game {
    display: flex; align-items: center; gap: 8px;
    padding: 5px 8px;
    border-radius: 5px;
    cursor: pointer;
    border-left: 3px solid transparent;
    transition: background .12s, border-color .12s;
  }
  .gs-game:hover { background: var(--card-hover); }
  body.mode-customer .gs-game:hover { background: #efeae0; }
  .gs-game.active {
    background: var(--card-hover);
    border-left-color: var(--gs-active);
  }
  body.mode-customer .gs-game.active {
    background: #efeae0;
    border-left-color: var(--gs-active);
  }
  .gs-game img {
    width: 40px; height: 24px;
    object-fit: cover;
    border-radius: 3px;
    background: #222;
    flex-shrink: 0;
  }
  .gs-game .name {
    font: 600 11px/1.2 'Inter', sans-serif;
    color: var(--fg);
    flex: 1; min-width: 0;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  body.mode-customer .gs-game .name { color: #111; }

  .config-panel {
    width: 420px; flex-shrink: 0;
    background: var(--bg-2);
    border-right: 1px solid var(--border-2);
    overflow-y: auto;
    padding: 14px;
    display: flex; flex-direction: column;
    gap: 10px;
  }

  .preview-stage {
    flex: 1; min-width: 0;
    overflow: auto;
    background:
      radial-gradient(ellipse 90% 35% at 50% -5%, rgba(0,172,203,0.08), transparent 70%),
      radial-gradient(ellipse 70% 30% at 100% 8%, rgba(246,82,33,0.05), transparent 70%),
      var(--bg);
    padding: 28px;
    display: flex; flex-direction: column; align-items: center; gap: 22px;
  }
  .pages { display: flex; flex-direction: column; gap: 22px; width: 210mm; max-width: 100%; }

  /* ----- Section cards (config panel) ----- */
  .section-card {
    background: var(--bg-3);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    /* Prevent the card from shrinking under flex layout — otherwise the
       inner content gets clipped instead of the parent panel scrolling. */
    flex-shrink: 0;
  }
  .section-card.dragging { opacity: 0.4; }
  .section-card.drop-target { box-shadow: 0 0 0 2px var(--accent); }
  .section-head {
    display: flex; align-items: center; gap: 8px;
    padding: 9px 10px;
    cursor: pointer;
    user-select: none;
    background: linear-gradient(180deg, rgba(0,172,203,0.07), transparent);
    border-bottom: 1px solid var(--border);
  }
  .section-head .grip { color: var(--muted); cursor: grab; font-size: 13px; padding: 0 2px; }
  .section-head .icon { font-size: 14px; opacity: .9; }
  .section-head .title {
    flex: 1;
    font: 600 11px/1.2 'Kanit'; letter-spacing:.12em; text-transform: uppercase;
    color: var(--fg);
  }
  .section-head .actions { display: flex; gap: 4px; }
  .section-head .actions button {
    background: transparent; border: 1px solid transparent; color: var(--muted);
    padding: 3px 6px; border-radius: 4px; cursor: pointer;
    font: 600 10px/1 'Kanit';
  }
  .section-head .actions button:hover { color: var(--fg); background: var(--card-hover); }
  .section-head .actions button.danger:hover { color: #fff; background: var(--warm); border-color: transparent; }
  .section-card.collapsed .section-body { display: none; }
  .section-body { padding: 10px 12px 12px; display: flex; flex-direction: column; gap: 10px; }

  .field { display: flex; flex-direction: column; gap: 4px; }
  /* Field is read-only because it pulls from the Matrix template. Visually
     greyed but still shown so the user can see the value and the source. */
  .field-locked input { opacity: 0.55; cursor: not-allowed; background: rgba(255,255,255,0.03); }
  .field-locked label { color: var(--muted); }
  .field-locked .locked-tag {
    display: inline-block; margin-left: 6px; padding: 1px 6px; border-radius: 3px;
    background: rgba(0,214,252,0.10); color: var(--accent-bright);
    border: 1px solid rgba(0,214,252,0.30);
    font: 700 8.5px/1.2 'Kanit'; letter-spacing: 0.14em; text-transform: uppercase;
  }
  .field-locked .locked-note { color: var(--muted); font-size: 10.5px; margin-top: 2px; }
  .field > label {
    font: 600 9.5px/1 'Kanit'; letter-spacing:.16em; text-transform: uppercase;
    color: var(--muted);
  }
  .field input[type=text], .field textarea {
    background: var(--bg); color: var(--fg); border: 1px solid var(--border);
    border-radius: 5px; padding: 7px 9px;
    font: 13px/1.4 'Bai Jamjuree', sans-serif;
    resize: vertical;
  }
  .field input[type=text]:focus, .field textarea:focus {
    outline: none; border-color: rgba(0,172,203,0.55); box-shadow: 0 0 0 2px rgba(0,172,203,0.18);
  }
  .field textarea { min-height: 60px; }
  .field.field-image {
    flex-direction: row; align-items: center; gap: 10px;
  }
  .field.field-image .img-pad {
    width: 56px; height: 56px; border-radius: 6px;
    background: var(--bg) center/cover no-repeat;
    border: 1px dashed var(--border-2);
    flex-shrink: 0;
  }
  .field.field-image .img-pad.has-image { border-style: solid; border-color: var(--accent-deep); }
  .field.field-image .img-pad-col { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 0; }
  .field.field-image .img-pad-col label {
    font: 600 9.5px/1 'Kanit'; letter-spacing:.16em; text-transform: uppercase; color: var(--muted);
  }
  .field.field-image .img-pad-row { display: flex; gap: 6px; }
  .field.field-image .img-pad-row button {
    background: var(--card); color: var(--fg); border: 1px solid var(--border);
    padding: 5px 9px; border-radius: 4px; cursor: pointer;
    font: 500 10px/1 'Kanit'; letter-spacing:.1em; text-transform: uppercase;
  }
  .field.field-image .img-pad-row button:hover { color: var(--accent-bright); border-color: rgba(0,172,203,0.4); }
  .field.field-image .img-pad-row button.danger:hover { color: var(--warm); border-color: var(--warm); }

  /* repeating items inside a section */
  .item-list { display: flex; flex-direction: column; gap: 8px; }
  .item-card {
    background: rgba(255,255,255,0.02);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 9px 10px;
    display: flex; flex-direction: column; gap: 8px;
    position: relative;
  }
  .item-card .item-head {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 0;
  }
  .item-card .item-head .item-title {
    font: 600 10px/1 'Kanit'; letter-spacing:.14em; text-transform: uppercase; color: var(--muted);
  }
  .item-card .item-head .item-actions { display: flex; gap: 4px; }
  .item-card .item-head button {
    background: transparent; border: 1px solid transparent; color: var(--muted);
    padding: 2px 6px; border-radius: 3px; cursor: pointer;
    font: 600 10px/1 'Kanit';
  }
  .item-card .item-head button:hover { color: var(--fg); background: var(--card-hover); }
  .item-card .item-head button.danger:hover { color: #fff; background: var(--warm); }

  .add-item-btn, .add-section-btn {
    background: transparent; color: var(--accent);
    border: 1px dashed rgba(0,172,203,0.4);
    padding: 7px 12px; border-radius: 5px; cursor: pointer;
    font: 600 10px/1 'Kanit'; letter-spacing: .14em; text-transform: uppercase;
    width: 100%;
  }
  .add-item-btn:hover, .add-section-btn:hover { border-color: var(--accent); background: rgba(0,172,203,0.06); color: var(--accent-bright); }

  .add-section-bar { padding: 6px 2px; position: relative; }
  .add-section-pop {
    position: absolute; left: 0; right: 0; bottom: calc(100% + 4px);
    background: var(--bg-2); border: 1px solid var(--border-2); border-radius: 8px;
    padding: 6px; display: none; flex-direction: column;
    box-shadow: 0 -8px 30px rgba(0,0,0,0.6);
    z-index: 50;
  }
  .add-section-bar.open .add-section-pop { display: flex; }
  .add-section-pop button {
    background: transparent; border: 0; color: var(--fg);
    text-align: left; padding: 7px 10px; border-radius: 4px; cursor: pointer;
    display: flex; align-items: center; gap: 8px;
    font: 500 11px/1.2 'Kanit'; letter-spacing:.1em; text-transform: uppercase;
  }
  .add-section-pop button:hover { background: var(--card-hover); color: var(--accent-bright); }

  /* RTP rows in panel */
  .rtp-rows { display: flex; flex-direction: column; gap: 5px; }
  .rtp-row-edit {
    display: grid; grid-template-columns: 1.5fr 1fr 1fr 1fr 1fr 18px; gap: 4px;
  }
  .rtp-row-edit input { font-size: 11px; padding: 5px 6px; }
  .rtp-row-edit .x {
    background: transparent; border: 0; color: var(--muted); cursor: pointer;
    font-size: 14px; line-height: 1;
  }
  .rtp-row-edit .x:hover { color: var(--warm); }

  /* Scatter assets editor */
  .scatter-edit { display: flex; flex-direction: column; gap: 6px; }
  .scatter-item {
    display: grid; grid-template-columns: 56px 1fr;
    gap: 8px; padding: 7px;
    background: rgba(0,0,0,0.18);
    border: 1px solid var(--border);
    border-radius: 5px;
    position: relative;
  }
  .scatter-item .img-pad { width: 56px; height: 56px; cursor: pointer; }
  .scatter-item .scatter-controls { display: flex; flex-direction: column; gap: 3px; }
  .scatter-item .scatter-row {
    display: grid; grid-template-columns: 22px 1fr 22px 1fr; gap: 4px;
    align-items: center;
  }
  .scatter-item .scatter-row label {
    font: 700 9px/1 'Kanit'; letter-spacing: .06em; color: var(--muted); text-align: right;
  }
  .scatter-item .scatter-row input {
    font-size: 10.5px; padding: 3px 5px;
    background: var(--bg); color: var(--fg);
    border: 1px solid var(--border); border-radius: 3px;
  }
  .scatter-item button.scatter-remove {
    position: absolute; top: 4px; right: 4px;
    background: transparent; border: 0; color: var(--muted); cursor: pointer;
    font: 700 13px/1 'Kanit'; padding: 0 4px;
  }
  .scatter-item button.scatter-remove:hover { color: var(--warm); }

  .scatter-library {
    margin-top: 4px;
    padding: 7px;
    background: rgba(0,172,203,0.06);
    border: 1px dashed rgba(0,172,203,0.3);
    border-radius: 5px;
  }
  .scatter-library-label {
    font: 600 9.5px/1 'Kanit'; letter-spacing:.14em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 6px;
  }
  .scatter-library-grid {
    display: grid; grid-template-columns: repeat(6, 1fr); gap: 4px;
  }
  .scatter-lib-btn {
    width: 100%; aspect-ratio: 1;
    background: rgba(255,255,255,0.04) center/contain no-repeat;
    border: 1px solid var(--border);
    border-radius: 4px;
    cursor: pointer;
    transition: border-color .12s, transform .12s;
  }
  .scatter-lib-btn:hover {
    border-color: var(--accent);
    transform: scale(1.06);
  }

  .bullets-edit { display: flex; flex-direction: column; gap: 4px; }
  .bullet-row { display: grid; grid-template-columns: 1fr 18px; gap: 4px; }
  .bullet-row input { font-size: 12px; padding: 5px 7px; }
  .bullet-row .x {
    background: transparent; border: 0; color: var(--muted); cursor: pointer;
    font-size: 14px; line-height: 1;
  }
  .bullet-row .x:hover { color: var(--warm); }

  /* Game header in panel */
  .panel-header {
    display: flex; flex-direction: column; gap: 6px;
    padding: 10px 12px;
    background: linear-gradient(180deg, var(--theme), rgba(0,0,0,0.0));
    border-radius: 8px;
    color: var(--theme-fg);
    margin-bottom: 4px;
    position: relative;
    overflow: hidden;
  }
  .panel-header .cat-label {
    font: 600 9px/1 'Kanit'; letter-spacing:.22em; text-transform: uppercase; opacity: .85;
  }
  .panel-header .game-name {
    font: 800 16px/1.1 'Inter', sans-serif; letter-spacing: -0.005em;
  }
  .panel-header .theme-color {
    display: flex; align-items: center; gap: 6px;
    font: 500 10.5px/1 'Kanit'; letter-spacing:.1em; text-transform: uppercase;
    opacity: .9;
  }
  .panel-header .theme-color input[type=color] {
    background: transparent; border: 1px solid rgba(255,255,255,0.4);
    border-radius: 3px; width: 22px; height: 18px; cursor: pointer; padding: 0;
  }

  /* ----- Document (A4 pages) ----- */
  .page {
    width: 210mm;
    min-height: 297mm;
    background: #fff;
    color: var(--doc-fg);
    box-shadow: 0 8px 40px rgba(0,0,0,0.55), 0 0 0 1px rgba(0,0,0,0.4);
    position: relative;
    overflow: hidden;
    font-family: 'Kanit', system-ui, sans-serif;
    page-break-after: always;
    break-after: page;
  }
  .page:last-child { page-break-after: auto; break-after: auto; }

  .page > .tan-band {
    background: var(--theme);
    color: var(--theme-fg);
    height: 28mm;
    width: 100%;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 16mm;
    position: relative;
    overflow: hidden;
  }
  .page > .tan-band::before {
    content: '';
    position: absolute; inset: 0;
    background-image: url('pattern-b.svg');
    background-size: 280px;
    background-repeat: repeat;
    opacity: 0.18;
    mix-blend-mode: overlay;
    pointer-events: none;
  }
  .page > .tan-band::after {
    content: '';
    position: absolute;
    top: -55%; right: -6%;
    width: 80mm; aspect-ratio: 1;
    background: radial-gradient(circle at center, rgba(255,255,255,0.28), transparent 65%);
    pointer-events: none;
  }
  .page > .tan-band > * { position: relative; z-index: 1; }

  /* Subtle theme-tinted corner glow on content pages */
  .page:not(.cover):not(.contact)::after {
    content: '';
    position: absolute;
    bottom: 0; right: 0;
    width: 110mm; height: 80mm;
    background: radial-gradient(circle at 85% 95%, color-mix(in srgb, var(--theme) 10%, transparent), transparent 70%);
    pointer-events: none;
    z-index: 0;
  }
  .page:not(.cover):not(.contact) .page-body { position: relative; z-index: 1; }

  .page > .tan-band .band-mark {
    display: flex; align-items: center; gap: 8mm;
  }
  .page > .tan-band .band-mark .game-pill {
    font: 800 11pt/1 'Inter', sans-serif;
    text-transform: uppercase; letter-spacing: .14em;
    color: var(--theme-fg);
  }
  .page > .tan-band .band-mark .game-cat {
    font: 600 8.5pt/1 'Inter', sans-serif;
    text-transform: uppercase; letter-spacing: .22em;
    color: var(--theme-fg); opacity: .7;
  }
  .page > .tan-band .brand-mark img {
    height: 9mm; opacity: .92;
  }
  .page.cover > .tan-band { display: none; }
  .page-body { padding: 12mm 18mm 18mm; }

  .page.cover {
    padding: 0;
    background: var(--theme);
    color: var(--theme-fg);
  }
  .page.cover::before {
    content: '';
    position: absolute; inset: 0;
    background-image: url('pattern-a.svg');
    background-size: 360px;
    background-repeat: repeat;
    opacity: 0.22;
    mix-blend-mode: overlay;
    pointer-events: none;
    z-index: 0;
  }
  .page.cover::after {
    content: '';
    position: absolute;
    top: -10%; left: -10%;
    width: 80%; aspect-ratio: 1;
    background: radial-gradient(circle at center, rgba(255,255,255,0.25), transparent 65%);
    pointer-events: none;
    z-index: 0;
  }
  .page.cover .cover-content {
    position: absolute; inset: 0; z-index: 2;
    display: flex; flex-direction: column;
    justify-content: space-between; align-items: center;
    text-align: center;
    padding: 18mm 16mm 18mm;
  }
  .page.cover .cover-game-logo {
    flex: 1;
    display: flex; align-items: center; justify-content: center;
    width: 100%; min-height: 0;
    padding: 8mm 0;
  }
  .page.cover .cover-game-logo img {
    max-width: 150mm;
    max-height: 150mm;
    object-fit: contain;
    display: block;
    filter: drop-shadow(0 12px 30px rgba(0,0,0,0.35));
  }
  .page.cover .cover-title {
    font-family: 'Bai Jamjuree', sans-serif;
    font-weight: 700;
    font-size: 26pt;
    line-height: 1.05;
    color: var(--theme-fg);
    max-width: 180mm;
    margin: 0 0 4mm;
    word-wrap: break-word;
    letter-spacing: -.005em;
  }
  .page.cover .cover-tagline {
    font-family: 'Kanit', sans-serif;
    font-weight: 500;
    font-size: 15pt;
    color: var(--theme-fg);
    opacity: .85;
    max-width: 160mm;
    margin: 0 0 2mm;
  }
  .page.cover .cover-ids {
    font-family: 'Kanit', sans-serif;
    font-weight: 600;
    font-size: 11pt;
    color: var(--theme-fg);
    opacity: .75;
    letter-spacing: .12em;
    text-transform: uppercase;
    margin: 0;
  }
  .page.cover .cover-footer {
    width: 100%;
    display: flex; flex-direction: column; align-items: center; gap: 3mm;
    padding-top: 6mm;
  }
  .page.cover .cover-footer img { height: 14mm; opacity: .95; }

  .page h1.section-h {
    font-family: 'Bai Jamjuree', sans-serif;
    font-weight: 800;
    font-size: 17pt;
    margin: 0 0 6mm;
    letter-spacing: .02em;
    color: #111;
    text-transform: uppercase;
  }
  .page h2.feature-h, .page h2.block-h {
    font-family: 'Bai Jamjuree', sans-serif;
    font-weight: 700;
    font-size: 11.5pt;
    margin: 0 0 2.5mm;
    letter-spacing: .02em;
    text-transform: uppercase;
    color: #111;
  }
  .page p, .page li {
    font-size: 11pt;
    line-height: 1.45;
    color: var(--doc-fg);
    margin: 0 0 3mm;
  }
  .page p .label, .page strong.label { font-weight: 700; }

  /* Category ELI5 explainer callout at the top of About */
  .category-explainer {
    background: color-mix(in srgb, var(--theme) 10%, transparent);
    border-left: 3px solid var(--theme);
    padding: 4mm 6mm;
    margin: 0 0 6mm;
    border-radius: 0 4px 4px 0;
    max-width: 168mm;
  }
  .category-explainer-label {
    font: 700 9pt/1 'Bai Jamjuree', sans-serif;
    text-transform: uppercase;
    letter-spacing: .12em;
    color: var(--theme);
    filter: brightness(.7);
    margin-bottom: 2mm;
  }
  .category-explainer-text {
    font-size: 10.5pt;
    line-height: 1.45;
    color: var(--doc-fg);
    font-style: italic;
    margin: 0;
  }

  /* Simple feature block (no images, like the Sheeple reference) */
  .feature-simple {
    margin-bottom: 7mm;
    max-width: 160mm;
  }
  .feature-simple p { margin-bottom: 0; }

  .feature-row {
    display: grid;
    grid-template-columns: 1fr 1.35fr;
    gap: 8mm;
    margin-bottom: 8mm;
    align-items: start;
  }
  .feature-row .col-text p { margin-bottom: 2mm; }
  .feature-row .col-media { display: flex; flex-direction: column; gap: 4mm; }

  .doc-img {
    background: #f3f0eb;
    border-radius: 4px;
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    min-height: 30mm;
  }
  .doc-img.empty {
    background-image: linear-gradient(45deg, #ece6d7 25%, transparent 25%, transparent 50%, #ece6d7 50%, #ece6d7 75%, transparent 75%);
    background-size: 14px 14px;
  }

  .bonus-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6mm;
    align-items: center;
    margin-bottom: 6mm;
  }
  .bonus-row.reverse { direction: rtl; }
  .bonus-row.reverse > * { direction: ltr; }
  .bonus-row .bonus-text p { margin-bottom: 2mm; }

  .devices {
    display: grid; grid-template-columns: 60mm 1fr; gap: 8mm 10mm;
    justify-items: center; align-items: start;
    margin-bottom: 8mm;
  }
  .devices .device-cell { text-align: center; width: 100%; }
  .devices .device-cell .device-h {
    font-family: 'Bai Jamjuree', sans-serif; font-weight: 700; font-size: 11pt;
    text-transform: uppercase; margin-bottom: 4mm; letter-spacing: .02em;
  }
  /* Mobile (cell 1) is portrait, spans both rows on the left.
     Tablet (cell 2) is landscape, top-right.
     Desktop (cell 3, .full) is landscape, full width below. */
  .devices .device-cell:nth-child(1) { grid-row: 1 / 3; }
  .devices .device-cell.full { grid-column: 1 / -1; }
  /* Slot aspect ratios match the multiview screenshot aspects so `cover` fills
     edge-to-edge without cropping. Border-radius mimics each device's
     real-world screen rounding. */
  .device-cell:nth-child(1) .doc-img {
    width: 60mm; height: 130mm;     /* 0.46 aspect — matches 390×844 mobile */
    border-radius: 2mm;
  }
  .device-cell:nth-child(2) .doc-img {
    width: 100%; max-width: 100mm; height: 70mm;  /* 1.43 — matches 1024×720 tablet */
    border-radius: 3mm;
  }
  .device-cell.full .doc-img {
    width: 100%; max-width: 160mm; height: 90mm;  /* 1.78 — matches 1280×720 desktop */
    border-radius: 2mm;
  }
  .devices .doc-img {
    background-size: cover;
    background-color: #111;
    overflow: hidden;
    box-shadow: 0 4px 14px rgba(0,0,0,0.18);
  }
  /* CTA block sits in the empty grid cell (row 2 / col 2, below the tablet). */
  .device-cta {
    grid-row: 2; grid-column: 2;
    align-self: center;
    display: flex; flex-direction: column; gap: 4mm;
    width: 100%; max-width: 100mm;
    padding: 4mm 0;
  }
  .cta-btn {
    display: inline-flex; align-items: center; justify-content: center;
    padding: 4mm 5mm; border-radius: 2mm;
    font-family: 'Bai Jamjuree', sans-serif;
    font-weight: 700; font-size: 11pt; letter-spacing: .04em;
    text-transform: uppercase; text-decoration: none;
    border: 1.5pt solid currentColor;
    color: #1a1a1a; background: transparent;
    transition: background .15s, color .15s;
  }
  .cta-btn:hover { background: #1a1a1a; color: #fff; }
  /* Primary CTA picks up the per-game theme colour so it ties into the rest
     of the document (cover band, accents, etc.). */
  .cta-btn.primary {
    background: var(--theme);
    color: var(--theme-fg);
    border-color: var(--theme);
  }
  .cta-btn.primary:hover { filter: brightness(1.1); }

  .game-data-summary p { margin-bottom: 2mm; font-size: 10.5pt; }
  .rtp-table {
    width: 100%;
    border-collapse: collapse;
    margin: 6mm 0;
    font-size: 10pt;
  }
  .rtp-table th, .rtp-table td { padding: 3mm 4mm; text-align: left; }
  .rtp-table thead th {
    color: var(--theme); filter: brightness(.7);
    font-weight: 700;
    border-bottom: 1px solid #ddd;
  }
  .rtp-table tbody tr { border-bottom: 1px solid #eee; }
  .rtp-table tbody tr:nth-child(even) { background: #f6f6f6; }
  .rtp-table td:first-child { color: #555; font-weight: 500; }

  /* Excel-style info table */
  .info-table {
    width: 100%;
    border-collapse: collapse;
    font-family: 'Bai Jamjuree', sans-serif;
    font-size: 10.5pt;
    margin: 4mm 0;
    border: 1px solid #d8d8d8;
  }
  .info-table tr { border-bottom: 1px solid #ececec; }
  .info-table tr:last-child { border-bottom: none; }
  .info-table tr.group-head {
    background: var(--theme);
    color: var(--theme-fg);
  }
  .info-table tr.group-head td {
    padding: 3mm 5mm;
    font: 800 9.5pt/1 'Inter', sans-serif;
    text-transform: uppercase; letter-spacing: .15em;
    color: var(--theme-fg);
    border-bottom: 1px solid rgba(0,0,0,0.1);
  }
  .info-table tr.kv td { padding: 2.6mm 5mm; vertical-align: top; }
  .info-table tr.kv td:first-child {
    width: 60mm;
    color: #555;
    font-weight: 500;
    border-right: 1px solid #ececec;
    background: #fafafa;
  }
  .info-table tr.kv td:nth-child(2) {
    font-weight: 600;
    color: #111;
  }
  .info-table tr.kv:nth-of-type(even) td:nth-child(2) { background: #fbfbfb; }

  /* Scatter assets - decorative images in blank areas */
  .scatter-layer {
    position: absolute; inset: 0;
    pointer-events: none;
    z-index: 0;
  }
  .scatter-asset {
    position: absolute;
    object-fit: contain;
    transform-origin: center center;
  }

  /* Game Rules */
  .rules-body { max-width: 168mm; }
  .rules-body .rules-h {
    font-family: 'Bai Jamjuree', sans-serif;
    font-weight: 700; font-size: 12pt;
    text-transform: uppercase; letter-spacing: .04em;
    color: var(--theme); filter: brightness(.75);
    margin: 7mm 0 2.5mm;
    break-after: avoid;
    page-break-after: avoid;
  }
  .rules-body .rules-h:first-child { margin-top: 0; }
  .rules-body .rules-p {
    font-size: 11pt; line-height: 1.45;
    margin: 0 0 3mm;
    break-inside: avoid;
  }
  .rules-body .rules-bullets {
    margin: 0 0 4mm 5mm; padding: 0;
    list-style: disc;
  }
  .rules-body .rules-bullets li {
    font-size: 11pt; line-height: 1.45;
    margin: 0 0 1.5mm;
    break-inside: avoid;
  }
  .rules-body .rules-details {
    margin: 0 0 4mm 4mm; padding: 0;
    list-style: none;
  }
  .rules-body .rules-details li {
    font-size: 10pt; line-height: 1.45;
    margin: 0 0 1.2mm;
    padding-left: 4mm;
    position: relative;
    break-inside: avoid;
    color: #333;
  }
  .rules-body .rules-details li::before {
    content: '•';
    position: absolute; left: 0;
    color: var(--theme); filter: brightness(.7);
    font-weight: 700;
  }

  .langcurr-list {
    font-size: 10.5pt; line-height: 1.55; color: #333;
    margin: 2mm 0 0; max-width: 165mm;
  }
  .langcurr-list.langcurr-codes {
    font-family: 'Inter', monospace, sans-serif;
    font-size: 9.5pt; line-height: 1.6;
    color: #444; letter-spacing: .01em;
  }

  .tech-block { margin-top: 6mm; }
  .tech-block h3 {
    font-family: 'Bai Jamjuree', sans-serif; font-weight: 700; font-size: 10pt;
    margin: 0 0 1mm; color: #111;
  }
  .tech-block p { font-size: 9.5pt; color: #444; margin: 0 0 4mm; font-style: italic; }

  .page.contact .footer-band {
    position: absolute; left: 0; right: 0; bottom: 0;
    height: 90mm;
    background: var(--theme);
    color: var(--theme-fg);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 18mm;
    overflow: hidden;
  }
  .page.contact .footer-band::before {
    content: '';
    position: absolute; inset: 0;
    background-image: url('pattern-b.svg');
    background-size: 380px;
    background-repeat: repeat;
    opacity: 0.16;
    mix-blend-mode: overlay;
    pointer-events: none;
  }
  .page.contact .footer-band::after {
    content: '';
    position: absolute;
    bottom: -40%; left: -10%;
    width: 100mm; aspect-ratio: 1;
    background: radial-gradient(circle at center, rgba(255,255,255,0.22), transparent 65%);
    pointer-events: none;
  }
  .page.contact .footer-band > * { position: relative; z-index: 1; }
  .page.contact .footer-band img { height: 18mm; opacity: .92; }
  .page.contact .footer-band .footer-tag {
    text-align: right;
    font: 600 11pt/1.3 'Inter', sans-serif;
    color: var(--theme-fg); opacity: .9;
  }
  .page.contact .contact-h {
    font-family: 'Bai Jamjuree', sans-serif; font-weight: 800; font-size: 16pt;
    margin: 0 0 4mm; letter-spacing: .01em;
    text-transform: uppercase; color: #111;
  }
  .page.contact .contact-cta { font-size: 11.5pt; margin-bottom: 16mm; }
  .page.contact .contact-block .contact-h2 {
    font-family: 'Bai Jamjuree', sans-serif; font-weight: 700; font-size: 14pt;
    margin: 0 0 5mm;
  }
  .page.contact .contact-block p { margin-bottom: 1.5mm; font-size: 12pt; }

  /* 1-pager - shorter than A4 */
  .page.one-pager {
    min-height: 290mm;
    height: 290mm;
    page: one-pager;
  }
  .page.one-pager .one-header {
    display: grid; grid-template-columns: 1fr auto; align-items: end;
    padding: 10mm 14mm 8mm;
    background: var(--theme);
    color: var(--theme-fg);
    position: relative;
    overflow: hidden;
  }
  .page.one-pager .one-header::before {
    content: '';
    position: absolute; inset: 0;
    background-image: url('pattern-b.svg');
    background-size: 320px;
    background-repeat: repeat;
    opacity: 0.18;
    mix-blend-mode: overlay;
    pointer-events: none;
  }
  .page.one-pager .one-header::after {
    content: '';
    position: absolute;
    top: -40%; right: -8%;
    width: 80mm; aspect-ratio: 1;
    background: radial-gradient(circle at center, rgba(255,255,255,0.25), transparent 65%);
    pointer-events: none;
  }
  .page.one-pager .one-header > * { position: relative; z-index: 1; }
  .page.one-pager .one-title {
    font-family: 'Playfair Display', Georgia, serif;
    font-weight: 600;
    font-size: 38pt;
    line-height: 1;
    margin: 2mm 0 0;
    color: var(--theme-fg);
  }
  .page.one-pager .one-category {
    font-family: 'Bai Jamjuree', sans-serif; font-weight: 700;
    text-transform: uppercase; letter-spacing: .15em;
    font-size: 11pt;
    margin: 0 0 1mm;
    color: var(--theme-fg); opacity: .85;
  }
  .page.one-pager .one-ids {
    font-family: 'Bai Jamjuree', sans-serif; font-weight: 800;
    font-size: 12pt; padding-bottom: 2mm; text-align: right;
    color: var(--theme-fg);
  }
  .page.one-pager .one-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 8mm;
    padding: 10mm 14mm 6mm;
    align-items: start;
  }
  .page.one-pager .one-hero .doc-img {
    width: 100%;
    aspect-ratio: 1 / 1;
    height: auto;
    border-radius: 6px;
  }
  .page.one-pager .one-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 4mm 6mm; }
  .page.one-pager .one-stat .stat-l {
    font-family: 'Bai Jamjuree', sans-serif; font-weight: 600;
    text-transform: uppercase; letter-spacing: .12em;
    font-size: 8.5pt; color: var(--doc-muted); margin-bottom: 1mm;
  }
  .page.one-pager .one-stat .stat-v {
    font-family: 'Bai Jamjuree', sans-serif; font-weight: 800;
    font-size: 18pt; line-height: 1.1; color: #111;
  }
  .page.one-pager .one-about {
    padding: 0 14mm 6mm;
    font-size: 10.5pt; line-height: 1.45;
  }
  .page.one-pager .one-features {
    display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5mm;
    padding: 0 14mm 8mm;
  }
  .page.one-pager .one-feature {
    border-top: 2px solid var(--theme); padding-top: 3mm;
    display: flex; flex-direction: column; align-items: center;
    text-align: center;
  }
  .page.one-pager .one-feature .feat-icon {
    width: 100%;
    height: 34mm;
    display: flex; align-items: center; justify-content: center;
    margin: 2mm 0 3mm;
  }
  .page.one-pager .one-feature .feat-icon img {
    max-width: 100%; max-height: 100%;
    object-fit: contain;
    display: block;
  }
  .page.one-pager .one-feature .feat-t {
    font-family: 'Bai Jamjuree', sans-serif; font-weight: 700; font-size: 10pt;
    text-transform: uppercase; letter-spacing: .04em; margin-bottom: 1.5mm;
    color: #111;
  }
  .page.one-pager .one-feature .feat-b {
    font-size: 9.5pt; line-height: 1.4; color: var(--doc-muted);
  }
  .page.one-pager .one-contact {
    position: absolute; left: 0; right: 0; bottom: 0;
    background: var(--theme); color: var(--theme-fg); padding: 6mm 14mm;
    display: grid; grid-template-columns: auto 1fr auto; gap: 6mm;
    align-items: center;
    overflow: hidden;
  }
  .page.one-pager .one-contact::before {
    content: '';
    position: absolute; inset: 0;
    background-image: url('pattern-b.svg');
    background-size: 280px;
    background-repeat: repeat;
    opacity: 0.16;
    mix-blend-mode: overlay;
    pointer-events: none;
  }
  .page.one-pager .one-contact::after {
    content: '';
    position: absolute;
    top: -80%; left: -8%;
    width: 70mm; aspect-ratio: 1;
    background: radial-gradient(circle at center, rgba(255,255,255,0.22), transparent 65%);
    pointer-events: none;
  }
  .page.one-pager .one-contact > * { position: relative; z-index: 1; }
  .page.one-pager .one-contact img { height: 9mm; }
  .page.one-pager .one-contact .cta-l {
    font-family: 'Bai Jamjuree', sans-serif; font-weight: 800; font-size: 13pt;
    text-transform: uppercase; letter-spacing: .02em; margin: 0;
    color: var(--theme-fg);
    text-align: center;
  }
  .page.one-pager .one-contact .cta-r {
    text-align: right; font-size: 10.5pt;
  }
  .page.one-pager .one-contact .cta-r p {
    margin: 0 0 1mm;
    color: #fff;
    font-weight: 600;
    /* Subtle dark text-shadow so the email/website stay readable against
       any theme colour, including warmer reds where #fff alone gets noisy. */
    text-shadow: 0 1px 1px rgba(0,0,0,0.25);
  }

  /* ----- Customer view (no editor chrome) ----- */
  body.mode-customer .toolbar { display: none !important; }
  body.mode-customer .preview-stage {
    background: linear-gradient(180deg, #f5f3ee 0%, #e9e6e0 100%);
    padding: 32px;
  }
  .print-fab {
    display: none;
    position: fixed; bottom: 24px; right: 24px; z-index: 200;
    background: linear-gradient(180deg, var(--accent), var(--accent-deep));
    color: #001218; border: none;
    padding: 12px 22px; border-radius: 999px;
    font: 700 12px/1 'Inter', sans-serif;
    letter-spacing: .08em; text-transform: uppercase;
    cursor: pointer;
    box-shadow: 0 6px 20px rgba(0,0,0,0.25);
  }
  body.mode-customer .print-fab { display: inline-flex; align-items: center; gap: 8px; }
  .print-fab:hover { filter: brightness(1.1); }
  .edit-hint {
    display: none;
    position: fixed; bottom: 24px; left: 24px; z-index: 200;
    color: #888; font: 500 10.5px/1.4 'Inter', sans-serif;
    pointer-events: none;
    text-align: left;
  }
  body.mode-customer .edit-hint { display: block; }

  /* ----- Matrix template (all-games spreadsheet) ----- */
  body.tpl-matrix .config-panel { display: none !important; }

function genId() { return 's_' + Math.random().toString(36).slice(2, 10); }
function escapeHTML(s){ return String(s ?? '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function escapeAttr(s){ return escapeHTML(s); }
function bgFor(img) { return img ? `style="background-image:url('${img.replace(/'/g, "%27")}')"` : 'class="doc-img empty"'; }
function imgClass(img) { return img ? 'doc-img' : 'doc-img empty'; }
function imgStyle(img) { return img ? `background-image:url('${img.replace(/'/g, "%27")}')` : ''; }

    render: (d, game) => {
      const blocks = d.blocks || [];
      // Estimate vertical space (mm) each block consumes
      function estimateHeight(b) {
        if (b.type === 'h') return 11;
        const t = b.text || '';
        if (b.type === 'p') {
          const lines = Math.max(1, Math.ceil(t.length / 80));
          return lines * 5.6 + 3;
        }
        if (b.type === 'bullet') {
          const lines = Math.max(1, Math.ceil(t.length / 78));
          return lines * 5.6 + 1.5;
        }
        if (b.type === 'detail') {
          const lines = Math.max(1, Math.ceil(t.length / 90));
          return lines * 5.0 + 1.2;
        }
        return 6;
      }
      // Pack blocks into pages, keeping a heading with its first content block
      const FIRST_PAGE_AVAIL = 220; // mm available after band + heading
      const CONT_PAGE_AVAIL  = 250; // mm available on continuation pages
      const pages = [[]];
      let used = 0;
      let isFirst = true;
      for (let i = 0; i < blocks.length; i++) {
        const b = blocks[i];
        const h = estimateHeight(b);
        const limit = isFirst ? FIRST_PAGE_AVAIL : CONT_PAGE_AVAIL;
        // If this is a heading right at the bottom, push to next page so heading travels with its content
        const isOrphanHeading = b.type === 'h' && (used + h + 20 > limit);
        if ((used + h > limit && pages[pages.length-1].length > 0) || isOrphanHeading) {
          pages.push([]);
          used = 0;
          isFirst = false;
        }
        pages[pages.length-1].push(b);
        used += h;
      }
      // Render each page as a proper A4 .page element
      function renderPage(pgBlocks, idx) {
        let html = '';

        for (const b of pgBlocks) {

          if (b.type === 'bullet') {
            if (listOpen !== 'bullet') { closeList(); html += '<ul class="rules-bullets">'; listOpen = 'bullet'; }
            html += `<li>${text}</li>`;
          } else if (b.type === 'detail') {
            if (listOpen !== 'detail') { closeList(); html += '<ul class="rules-details">'; listOpen = 'detail'; }
            html += `<li>${text}</li>`;
          } else if (b.type === 'h') {
            closeList();
            html += `<h2 class="rules-h">${text}</h2>`;
          } else {
            closeList();
            html += `<p class="rules-p">${text}</p>`;
          }
        }
        closeList();
        return `
<section class="page">
  ${tanBand(game)}
  <div class="page-body">
    ${idx === 0 ? `<h1 class="section-h">${escapeHTML(d.heading || 'Game Rules')}</h1>` : ''}
    <div class="rules-body">${html}</div>
  </div>
</section>`;
      }
      return pages.map(renderPage).join('');
    },
  },

function buildDefaultDoc(game, template) {

// ============================================================
// IndexedDB (v2 - structured data)
// ============================================================
const DB_NAME = 'solidicon-sheets';
const DB_VERSION = 2;
const STORE = 'docs-v2';
let dbp = null;
function openDB() {
  if (dbp) return dbp;
  dbp = new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = () => {
      const db = req.result;
      if (!db.objectStoreNames.contains(STORE)) db.createObjectStore(STORE);
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
  return dbp;
}
async function dbGet(key) {
  const db = await openDB();
  return new Promise((res, rej) => {
    const r = db.transaction(STORE, 'readonly').objectStore(STORE).get(key);
    r.onsuccess = () => res(r.result); r.onerror = () => rej(r.error);
  });
}
async function dbSet(key, value) {
  const db = await openDB();
  return new Promise((res, rej) => {
    const tx = db.transaction(STORE, 'readwrite');
    tx.objectStore(STORE).put(value, key);
    tx.oncomplete = () => res(); tx.onerror = () => rej(tx.error);
  });
}
async function dbDel(key) {
  const db = await openDB();
  return new Promise((res, rej) => {
    const tx = db.transaction(STORE, 'readwrite');
    tx.objectStore(STORE).delete(key);
    tx.oncomplete = () => res(); tx.onerror = () => rej(tx.error);
  });
}
async function dbKeys() {
  const db = await openDB();
  return new Promise((res, rej) => {
    const r = db.transaction(STORE, 'readonly').objectStore(STORE).getAllKeys();
    r.onsuccess = () => res(r.result); r.onerror = () => rej(r.error);
  });
}
async function dbAll() {
  const keys = await dbKeys();
  const out = {};
  for (const k of keys) out[k] = await dbGet(k);
  return out;
}

// ============================================================
// Save / load
// ============================================================
let saveTimer = null;
function scheduleSave() {
  setStatus('Saving…');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    try {
      await dbSet(docKey(), { ...state.doc, themeColor: game().themeColor, updated: Date.now() });
      setStatus('Saved (local)', 'saved');
    } catch (e) { setStatus('Save error: ' + e.message, 'error'); }
  }, 250);
}

async function loadDoc() {
  const saved = await dbGet(docKey());
  if (saved) {
    state.doc = saved;
    const g = game();
    // Only adopt the saved themeColor if it isn't a known-stale value — otherwise
    // we'd flash the wrong color until migrateDoc runs (which it does right after,
    // but applyTheme between can pick up the stale color in some flows).
    if (saved.themeColor && saved.themeColor !== g.themeColor && !isStaleTheme(g.key, saved.themeColor)) {
      g.themeColor = saved.themeColor;
    }
    migrateDoc();
    setStatus('Saved (local)', 'saved');
    return;
  }
  if (window.SOLIDICON_SHEETS_SEED && window.SOLIDICON_SHEETS_SEED[docKey()]) {
    state.doc = JSON.parse(JSON.stringify(window.SOLIDICON_SHEETS_SEED[docKey()]));
    migrateDoc();
    setStatus('Loaded from seed-data.js', '');
    return;
  }
  state.doc = buildDefaultDoc(game(), state.template);
  setStatus('New sheet - defaults from solidicon.com', '');
}

// One-time migrations applied to older saved docs so they pick up new defaults
function migrateDoc() {
  if (!state.doc) return;
  const g = game();
  const seed = WEBSITE_SEED[g.key] || {};
  state.doc._migrated = state.doc._migrated || {};
  let dirty = false;
  // Theme color: if saved value is a stale default that's since been replaced, snap to new factory default
  // (runs for BOTH product-sheet and one-pager docs)
  if (isStaleTheme(g.key, state.doc.themeColor)) {
    const newDefault = FACTORY_THEMES[g.key];
    state.doc.themeColor = newDefault;
    g.themeColor = newDefault;
    dirty = true;
  }
  // Section-based migrations only apply to product-sheet docs
  if (!state.doc.sections) {
    if (dirty) scheduleSave();
    return;
  }
  // Cover: ensure gameLogo is set (older covers didn't have this field at all)
  for (const sec of state.doc.sections) {
    if (sec.type === 'cover' && sec.data.gameLogo === undefined) {
      sec.data.gameLogo = imageFor(g.key, 'square');
      dirty = true;
    }
    // Auto-seed scatter assets on About sections that have never had them set
    if (sec.type === 'about' && sec.data.scatterAssets === undefined) {
      sec.data.scatterAssets = defaultScatterFor(g.key);
      dirty = true;
    }
    // Auto-seed category ELI5 explainer on About sections that have never had it
    if (sec.type === 'about' && sec.data.categoryExplainer === undefined) {
      sec.data.categoryExplainer = explainerFor(g.category);
      dirty = true;
    }
    // Replace older 3-asset auto-seed with the new single centred asset
    // (only if none of the current items are user-uploaded data: URLs)
    if (
      sec.type === 'about' &&
      !state.doc._migrated.aboutScatterSingle &&
      Array.isArray(sec.data.scatterAssets) &&
      sec.data.scatterAssets.length > 1 &&
      sec.data.scatterAssets.every(s => s.image && !s.image.startsWith('data:'))
    ) {
      sec.data.scatterAssets = defaultScatterFor(g.key);
      dirty = true;
    }
  }
  state.doc._migrated.aboutScatterSingle = true;
  // Replace Swiminator rules that were imported from SwiminatorExtreme (mis-mapped)
  if (g.key === 'swiminator' && !state.doc._migrated.swiminatorRules) {
    for (const sec of state.doc.sections) {
      if (sec.type === 'gameRules' && Array.isArray(sec.data.blocks)) {
        const first = sec.data.blocks[0];
        if (first && first.text && first.text.includes('Fishinator Extreme')) {
          sec.data.blocks = GAME_RULES.swiminator.map(b => ({ ...b }));
          dirty = true;
        }
      }
    }
    state.doc._migrated.swiminatorRules = true;
    dirty = true;
  }
  // Auto-add Game Rules section (once per doc, only if we have rules for this game)
  if (!state.doc._migrated.gameRules && GAME_RULES[g.key]) {
    const hasRules = state.doc.sections.some(s => s.type === 'gameRules');
    if (!hasRules) {
      const devicesIdx = state.doc.sections.findIndex(s => s.type === 'devices');
      const data = SECTION_TYPES.gameRules.default(g, seed);
      const insertAt = devicesIdx >= 0 ? devicesIdx : state.doc.sections.length;
      state.doc.sections.splice(insertAt, 0, { id: genId(), type: 'gameRules', data });
    }
    state.doc._migrated.gameRules = true;
    dirty = true;
  }
  // Auto-add Languages & Currencies section (once per doc)
  if (!state.doc._migrated.langCurr) {
    const hasLangCurr = state.doc.sections.some(s => s.type === 'langCurr');
    if (!hasLangCurr) {
      const contactIdx = state.doc.sections.findIndex(s => s.type === 'contact');
      const data = SECTION_TYPES.langCurr.default(g, seed);
      const insertAt = contactIdx >= 0 ? contactIdx : state.doc.sections.length;
      state.doc.sections.splice(insertAt, 0, { id: genId(), type: 'langCurr', data });
    }
    state.doc._migrated.langCurr = true;
    dirty = true;
  }
  if (dirty) scheduleSave();
}

  { key: 'rtp',          label: 'RTP',        sort: 'string', edit: true },
  { key: 'volatility',   label: 'Volatility', sort: 'string', edit: true },
  { key: 'maxWinFactor', label: 'Max win',    sort: 'number', edit: true },
  { key: 'minBet',       label: 'Min bet',    sort: 'number', edit: true },
  { key: 'maxBet',       label: 'Max bet',    sort: 'number', edit: true },
  { key: 'defaultBet',   label: 'Default',    sort: 'number', edit: true },
  { key: 'betAdjustable',label: 'Bet adj.',   sort: 'string', edit: true },
  { key: 'portrait',     label: 'Portrait',   sort: 'string', edit: true },
  { key: 'gameFeatures', label: 'Features',   sort: 'string', edit: true },
  // Tail columns — hidden behind the "+ More" toggle until expanded.
  { key: 'brands',       label: 'Brands',     sort: 'string', edit: true,  extra: true },
  { key: 'releaseDate',  label: 'Released',   sort: 'string', edit: true,  extra: true },
];
const MATRIX_KEY = 'matrix::overrides';
let matrixOverrides = null; // { [gameKey]: { [field]: value } }
const matrixState = { category: 'All', search: '', sortKey: 'category', sortDir: 'asc', showExtra: false };

async function loadMatrixOverrides() {
  if (matrixOverrides) return matrixOverrides;
  matrixOverrides = (await dbGet(MATRIX_KEY)) || {};
  return matrixOverrides;
}
async function saveMatrixOverrides() {
  await dbSet(MATRIX_KEY, matrixOverrides || {});
  setStatus('Saved (local)', 'saved');
}

// Matrix is the source of truth for game-info fields. Returns matrix override
// merged with EXCEL_DATA defaults — used by every section render that needs
// game-info (cover, infoSheet, one-pager). Falls back gracefully when
// matrixOverrides hasn't loaded yet — that just means EXCEL_DATA defaults.
function matrixInfo(gameKey) {
  const e = (typeof EXCEL_DATA !== 'undefined' && EXCEL_DATA[gameKey]) || {};
  const o = (matrixOverrides && matrixOverrides[gameKey]) || {};
  const pick = (k) => (o[k] != null && o[k] !== '') ? o[k] : (e[k] || '');
  return {
    platform:      pick('platform'),
    gameCode:      pick('gameCode'),
    gameType:      pick('gameType'),
    rtp:           pick('rtp'),
    volatility:    pick('volatility'),
    maxWinFactor:  pick('maxWinFactor'),
    minBet:        pick('minBet'),
    maxBet:        pick('maxBet'),
    defaultBet:    pick('defaultBet'),
    betAdjustable: pick('betAdjustable'),
    portrait:      pick('portrait'),
    brands:        pick('brands'),
    gameFeatures:  pick('gameFeatures'),
    releaseDate:   pick('releaseDate'),
  };
}
function matrixRowData(g) {
  const e = (typeof EXCEL_DATA !== 'undefined' && EXCEL_DATA[g.key]) || {};
  const o = (matrixOverrides && matrixOverrides[g.key]) || {};
  // Map EXCEL_DATA's `gameCode`/`gameType`/`gameFeatures` to the column keys.
  const base = {
    name: g.name,
    category: g.category,
    gameCode: e.gameCode || '',
    platform: e.platform || '',
    gameType: e.gameType || '',
    rtp: e.rtp || '',
    volatility: e.volatility || '',
    maxWinFactor: e.maxWinFactor || '',
    minBet: e.minBet || '',
    maxBet: e.maxBet || '',
    defaultBet: e.defaultBet || '',
    betAdjustable: e.betAdjustable || '',
    portrait: e.portrait || '',
    brands: e.brands || '',
    gameFeatures: e.gameFeatures || '',
    releaseDate: e.releaseDate || '',
  };
  return { ...base, ...o };
}

function mxCatSlug(c) { return String(c || '').toLowerCase().replace(/\s+/g, '-'); }
function mxVolTag(v) {
  const s = String(v).toLowerCase();
  let cls = 'mtag-vol-medium';
  if (s.includes('high'))        cls = 'mtag-vol-high';
  else if (s.includes('medium')) cls = 'mtag-vol-medium';
  else if (s.includes('low'))    cls = 'mtag-vol-low';
  return `<span class="mtag ${cls}">${escapeHTML(v)}</span>`;
}
function mxTypeTag(v) {
  const s = String(v).toLowerCase();
  let cls = 'mtag-type-other';
  if (/racing/.test(s)) cls = 'mtag-type-racing-crash';
  else if (/crash/.test(s)) cls = 'mtag-type-crash';
  else if (/mine/.test(s))  cls = 'mtag-type-mines';
  else if (/sport|football|vfl/.test(s)) cls = 'mtag-type-sports';
  return `<span class="mtag ${cls}">${escapeHTML(v)}</span>`;
}
function mxYesNoTag(v) {
  const s = String(v).toLowerCase();
  if (s === 'yes' || s === 'y' || s === 'true') return `<span class="mtag mtag-yes">Yes</span>`;
  if (s === 'no'  || s === 'n' || s === 'false') return `<span class="mtag mtag-no">No</span>`;
  return escapeHTML(v);
}
function mxPlatformTag(v) { return `<span class="mtag mtag-platform">${escapeHTML(v)}</span>`; }
function mxCategoryTag(v) { return `<span class="mtag mtag-cat-${escapeAttr(mxCatSlug(v))}">${escapeHTML(v)}</span>`; }
// Features field can hold multiple comma-separated mechanics ("Free bets, Bonus");
// render each as its own pill so they read as discrete game features.
function mxFeaturesTag(v) {
  return String(v).split(/[,;]+/).map(s => s.trim()).filter(Boolean)
    .map(item => `<span class="mtag mtag-features">${escapeHTML(item)}</span>`)
    .join(' ');
}
const MATRIX_TAGS = {
  volatility: mxVolTag, gameType: mxTypeTag,
  betAdjustable: mxYesNoTag, portrait: mxYesNoTag,
  platform: mxPlatformTag, category: mxCategoryTag,
  gameFeatures: mxFeaturesTag,
};

function mxParseNum(s) {
  if (s == null || s === '') return NaN;
  const m = String(s).replace(/[,\s]/g, '').replace(/[^\d.\-]/g, '').match(/-?\d+(?:\.\d+)?/);
  return m ? parseFloat(m[0]) : NaN;
}
function mxCmp(a, b, type) {
  const ae = a == null || a === '', be = b == null || b === '';
  if (ae && be) return 0;
  if (ae) return 1;
  if (be) return -1;
  if (type === 'number') return (mxParseNum(a) || 0) - (mxParseNum(b) || 0);
  return String(a).localeCompare(String(b));
}

function renderMatrix() {
  // Synchronous render of cached data; loadMatrixOverrides() runs once on
  // the first Matrix activation and triggers a re-render when ready.
  if (!matrixOverrides) {
    loadMatrixOverrides().then(() => renderDocument());
  }
  const all = GAMES.map(g => ({ g, row: matrixRowData(g) }));
  const cats = ['All', ...[...new Set(GAMES.map(g => g.category))]];
  const counts = Object.fromEntries(cats.map(c => [c, c === 'All' ? all.length : all.filter(x => x.g.category === c).length]));
  const q = (matrixState.search || '').toLowerCase();
  let visible = all.filter(({ row, g }) => {
    if (matrixState.category !== 'All' && g.category !== matrixState.category) return false;
    if (!q) return true;
    return MATRIX_COLS.some(c => String(row[c.key] || '').toLowerCase().includes(q));
  });
  const sortCol = MATRIX_COLS.find(c => c.key === matrixState.sortKey);
  if (sortCol && sortCol.sort !== 'none') {
    const dir = matrixState.sortDir === 'asc' ? 1 : -1;
    visible.sort((a, b) => dir * mxCmp(a.row[matrixState.sortKey], b.row[matrixState.sortKey], sortCol.sort));
  }
  const chips = cats.map(c =>
    `<button class="matrix-chip ${matrixState.category === c ? 'active' : ''}" data-cat="${escapeAttr(c)}">${escapeHTML(c)} <span class="count">${counts[c]}</span></button>`
  ).join('');

  // Detect "uniform" columns — every visible row has the same non-empty value.
  // These get pulled out of the table and surfaced in the "Common to all"
  // strip below so the table stays scannable. Identity columns (icon, name,
  // category, code) and the actions column are excluded from the check.
  // Identity columns + bet columns stay in the table even when their values
  // happen to be uniform — operators expect to see min/max/default bet on
  // every row at a glance.
  const SKIP_UNIFORM = new Set(['icon', 'name', 'category', 'gameCode', 'minBet', 'maxBet', 'defaultBet']);
  const uniform = {};
  if (visible.length >= 2) {
    for (const c of MATRIX_COLS) {
      if (SKIP_UNIFORM.has(c.key)) continue;
      // Treat blank cells as "doesn't apply" — they don't break uniformity.
      // If every non-blank value matches and at least two rows have one, the
      // column is considered uniform.
      const nonEmpty = visible.map(({ row }) => String(row[c.key] ?? '').trim()).filter(Boolean);
      if (nonEmpty.length < 2) continue;
      const first = nonEmpty[0];
      if (nonEmpty.every(v => v === first)) uniform[c.key] = first;
    }
  }
  // Hide `extra` (tail) columns unless the user has expanded them. They
  // remain in MATRIX_COLS so the uniformity detection above still considers
  // their values for the strip.
  const tableCols = MATRIX_COLS.filter(c => !(c.key in uniform) && (!c.extra || matrixState.showExtra));
  const extraCount = MATRIX_COLS.filter(c => c.extra).length;

  const thead = '<thead><tr>' + tableCols.map(c => {
    const sortCls = c.sort !== 'none' && matrixState.sortKey === c.key ? ` sort-${matrixState.sortDir}` : '';
    return `<th class="${c.cls || ''}${sortCls}" data-key="${escapeAttr(c.key)}" data-sort="${escapeAttr(c.sort)}">${escapeHTML(c.label)}<span class="sort-arrow"></span></th>`;
  }).join('') + '</tr></thead>';
  const tbody = '<tbody>' + visible.map(({ g, row }) => {
    const cells = tableCols.map(c => {
      if (c.key === 'icon') {
        return `<td class="cell-icon"><img class="game-icon" alt="" src="${escapeAttr(imageFor(g.key, 'square'))}" onerror="this.style.background='#111'"></td>`;
      }
      const v = row[c.key];
      const has = v != null && String(v).trim() !== '';
      const tagger = MATRIX_TAGS[c.key];
      const inner = has ? (tagger ? tagger(v) : escapeHTML(v)) : '—';
      // Editable only when body.mode-edit is set (i.e. dev mode / ?edit URL).
      // Customer / view mode renders read-only cells.
      const canEdit = c.edit && document.body.classList.contains('mode-edit');
      const editable = canEdit ? ' contenteditable="true" spellcheck="false"' : '';
      return `<td class="${c.cls || ''}${has ? '' : ' empty'}" data-key="${escapeAttr(g.key)}" data-field="${escapeAttr(c.key)}"${editable}>${inner}</td>`;
    }).join('');
    const selCls = g.key === state.gameKey ? ' mx-selected' : '';
    return `<tr data-key="${escapeAttr(g.key)}" class="${selCls.trim()}">${cells}</tr>`;
  }).join('') + '</tbody>';

  // "Common to all" strip: shown only when at least one column was hidden.
  // Uses the same value taggers (Yes/No pill, type pill, etc.) for consistency.
  let commonStrip = '';
  if (Object.keys(uniform).length > 0) {
    const items = Object.entries(uniform).map(([k, v]) => {
      const col = MATRIX_COLS.find(c => c.key === k);
      const tagger = MATRIX_TAGS[k];
      const valHtml = tagger ? tagger(v) : `<span class="matrix-common-value">${escapeHTML(v)}</span>`;
      return `<div class="matrix-common-item">
        <span class="matrix-common-label">${escapeHTML(col ? col.label : k)}</span>
        ${valHtml}
      </div>`;
    }).join('');
    commonStrip = `<div class="matrix-common">
      <div class="matrix-common-title">Common to all ${visible.length} games shown</div>
      ${items}
    </div>`;
  }

  return `<div class="matrix-wrap">
    <div class="matrix-toolbar">
      ${chips}
      <input type="search" class="matrix-search" placeholder="Search…" value="${escapeAttr(matrixState.search)}">
      <button class="matrix-chip matrix-extra-toggle ${matrixState.showExtra ? 'active' : ''}" data-toggle-extra>${matrixState.showExtra ? '− Hide brands & released' : `+ Brands & released (${extraCount})`}</button>
      <span class="matrix-hint">${visible.length} of ${all.length}${document.body.classList.contains('mode-edit') ? ' · click any cell to edit' : ''}</span>
    </div>
    <table class="matrix">${thead}${tbody}</table>
    ${commonStrip}
  </div>`;
}

function wireMatrix() {
  const root = document.getElementById('pages');
  if (!root) return;
  root.querySelectorAll('.matrix-chip[data-cat]').forEach(b => b.addEventListener('click', () => {
    matrixState.category = b.dataset.cat;
    renderDocument();
  }));
  const extraBtn = root.querySelector('[data-toggle-extra]');
  if (extraBtn) extraBtn.addEventListener('click', () => {
    matrixState.showExtra = !matrixState.showExtra;
    renderDocument();
  });
  const search = root.querySelector('.matrix-search');
  if (search) {
    search.addEventListener('input', (e) => {
      matrixState.search = e.target.value;
      // Don't re-render on every keystroke (loses caret); re-render on debounce.
      clearTimeout(wireMatrix._t);
      wireMatrix._t = setTimeout(() => renderDocument(), 180);
    });
  }
  root.querySelectorAll('table.matrix thead th').forEach(th => {
    if (th.dataset.sort === 'none') return;
    th.addEventListener('click', () => {
      const k = th.dataset.key;
      if (matrixState.sortKey === k) matrixState.sortDir = matrixState.sortDir === 'asc' ? 'desc' : 'asc';
      else { matrixState.sortKey = k; matrixState.sortDir = 'asc'; }
      renderDocument();
    });
  });
  // Edit handling: on blur, capture plain text, save override, re-render.
  root.querySelectorAll('td[contenteditable="true"]').forEach(td => {
    td.addEventListener('focus', () => {
      // While editing, show raw text not the tag pill so the user types into a clean string.
      const k = td.dataset.key, field = td.dataset.field;
      const row = matrixRowData(GAMES.find(g => g.key === k));
      td.dataset.before = row[field] || '';
      td.textContent = row[field] || '';
    });
    td.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); td.blur(); }
      if (e.key === 'Escape') { td.textContent = td.dataset.before || ''; td.blur(); }
    });
    td.addEventListener('blur', async () => {
      const k = td.dataset.key, field = td.dataset.field;
      const newVal = td.textContent.trim();
      const before = td.dataset.before || '';
      if (newVal === before) {
        // Nothing changed — just re-render so the tag pill returns.
        renderDocument();
        return;
      }
      matrixOverrides = matrixOverrides || {};
      matrixOverrides[k] = matrixOverrides[k] || {};
      // Store the new value — including empty strings (cleared cells stay blank).
      // To revert a cell to the EXCEL_DATA default: right-click the cell.
      matrixOverrides[k][field] = newVal;
      await saveMatrixOverrides();
      renderDocument();
    });
    // Right-click resets the override for this cell so the EXCEL_DATA default
    // (or seed-data) flows back through.
    td.addEventListener('contextmenu', async (e) => {
      e.preventDefault();
      const k = td.dataset.key, field = td.dataset.field;
      if (!matrixOverrides || !matrixOverrides[k] || !(field in matrixOverrides[k])) return;
      delete matrixOverrides[k][field];
      if (Object.keys(matrixOverrides[k]).length === 0) delete matrixOverrides[k];
      await saveMatrixOverrides();
      renderDocument();
    });
  });
}

let _renderPending = false;
function renderDocument() {
  if (_renderPending) return;
  _renderPending = true;
  requestAnimationFrame(() => {
    _renderPending = false;
    try {
      // Update body class so CSS can hide the game switcher / config panel
      // when the Matrix template is active.
      document.body.classList.toggle('tpl-matrix', state.template === 'matrix');
      if (state.template === 'matrix') {
        pagesEl.innerHTML = renderMatrix();
        wireMatrix();
        return;
      }
      applyTheme();
      // Guard: if doc shape doesn't match active template, rebuild from defaults
      const isOnePager = state.template === 'one-pager';
      const shapeOk = state.doc && ((isOnePager && state.doc.one) || (!isOnePager && Array.isArray(state.doc.sections)));
      if (!shapeOk) {
        console.warn('Doc shape mismatch - rebuilding from defaults', state.doc, state.template);
        state.doc = buildDefaultDoc(game(), state.template);
      }
      if (isOnePager) {
        pagesEl.innerHTML = renderOnePager();
        return;
      }
      const html = state.doc.sections.map(sec => {
        const t = SECTION_TYPES[sec.type];
        if (!t) return '';
        try {
          let secHtml = t.render(sec.data, game());
          const scatters = sec.data && sec.data.scatterAssets;
          // Devices page hosts real product screenshots + CTAs — keep it free
          // of decorative scatter assets so nothing competes with the shots.
          if (scatters && scatters.length && sec.type !== 'devices') {
            const layer = renderScatterLayer(scatters);
            secHtml = secHtml.replace(/<\/section>/g, layer + '</section>');
          }
          return secHtml;
        }
        catch (e) { console.error('Section render error', sec.type, e); return ''; }
      }).join('');
      pagesEl.innerHTML = html;
    } catch (e) {
      console.error('Render failed', e);
      pagesEl.innerHTML = `<div style="background:#fff;color:#900;padding:30mm;width:210mm;font:14pt/1.5 sans-serif;">Render error: ${escapeHTML(e.message)}<br><br>Open browser DevTools console for details, or add <code>?edit</code> to the URL to access the editor.</div>`;
    }
  });
}

function autoFitCoverTitles() {
  pagesEl.querySelectorAll('.cover-title').forEach(el => {
    // Find available height from the .cover-center parent minus the tagline below
    const center = el.parentElement;
    const tagline = center.querySelector('.cover-tagline');
    const availableH = center.clientHeight - (tagline ? tagline.offsetHeight + 30 : 0);
    const availableW = center.clientWidth - 20;
    let size = 110;
    el.style.fontSize = size + 'pt';
    // Shrink until fits both width and height
    while (size > 32 && (el.scrollWidth > availableW || el.scrollHeight > availableH)) {
      size -= 3;
      el.style.fontSize = size + 'pt';
    }
  });
}

// Track which sections are expanded (collapsed by default on every render)
const expandedSections = new Set();

function renderSectionCard(sec, index) {
  const t = SECTION_TYPES[sec.type];
  if (!t) return '';

  const collapsedClass = isExpanded ? '' : ' collapsed';
  return `
<div class="section-card${collapsedClass}" data-section-id="${sec.id}" draggable="true">
  <div class="section-head">
    <span class="grip" title="Drag to reorder">⋮⋮</span>
    <span class="icon">${t.icon}</span>
    <span class="title">${escapeHTML(t.label)}</span>
    <span class="actions">
      <button data-act="up" title="Move up">↑</button>
      <button data-act="down" title="Move down">↓</button>
      <button data-act="collapse" title="Expand/collapse">▾</button>
      <button data-act="remove" class="danger" title="Remove section">×</button>
    </span>
  </div>
  <div class="section-body">
    ${t.fields.map(f => renderField(f, sec.data, sec.id)).join('')}
  </div>
</div>`;
}

// Fields whose values are owned by the Matrix template — rendered as
// locked/read-only across every section's editor panel so there's only one
// place to edit them (Matrix). Map: { sectionType: { fieldKey: matrixInfoKey } }
const MATRIX_LOCKED = {
  cover:     { gameIds: 'gameCode' },
  infoSheet: {
    platform: 'platform', gameCode: 'gameCode', gameType: 'gameType',
    releaseDate: 'releaseDate', portrait: 'portrait',
    rtp: 'rtp', volatility: 'volatility', maxWinFactor: 'maxWinFactor',
    defaultBet: 'defaultBet', minBet: 'minBet', maxBet: 'maxBet',
    betAdjustable: 'betAdjustable',
    gameFeatures: 'gameFeatures', brands: 'brands',
  },
};

function renderField(f, data, sectionId) {
  const v = data[f.key];
  // Check if this field is matrix-managed for the current section type.
  const section = state.doc && state.doc.sections && state.doc.sections.find(s => s.id === sectionId);
  if (section && MATRIX_LOCKED[section.type] && MATRIX_LOCKED[section.type][f.key]) {
    const matrixKey = MATRIX_LOCKED[section.type][f.key];
    return lockedFromMatrixField(f.label, matrixInfo(state.gameKey)[matrixKey]);
  }
  if (f.type === 'text')     return textField(f.label, f.key, v);
  if (f.type === 'textarea') return textareaField(f.label, f.key, v);
  if (f.type === 'image')    return imageField(f.label, f.key, v);
  if (f.type === 'bullets')  return bulletsField(f.label, f.key, v || []);
  if (f.type === 'rtpRows')  return rtpRowsField(f.label, f.key, v || []);
  if (f.type === 'idsHeaders') return idsHeadersField(f.label, f.key, v || []);
  if (f.type === 'list')     return listField(f, v || []);
  if (f.type === 'scatter')  return scatterField(f.label, f.key, v || []);
  return '';
}

function scatterField(label, key, items) {
  const library = SCATTER_LIBRARY[state.gameKey] || [];
  return `
<div class="field">
  <label>${escapeHTML(label)}</label>
  <div class="scatter-edit" data-scatter="${escapeAttr(key)}">
    ${items.map((s, i) => `
      <div class="scatter-item" data-scatter-i="${i}">
        <div class="img-pad ${s.image ? 'has-image' : ''}" style="${s.image ? `background-image:url('${escapeAttr(s.image)}')` : ''}" data-scatter-upload="${i}"></div>
        <div class="scatter-controls">
          <div class="scatter-row">
            <label>X%</label><input type="number" data-scatter-field="x" data-si="${i}" value="${s.x}" min="-20" max="120">
            <label>Y%</label><input type="number" data-scatter-field="y" data-si="${i}" value="${s.y}" min="-20" max="120">
          </div>
          <div class="scatter-row">
            <label>mm</label><input type="number" data-scatter-field="size" data-si="${i}" value="${s.size}" min="6" max="160">
            <label>°</label><input type="number" data-scatter-field="rotation" data-si="${i}" value="${s.rotation}" min="-180" max="180" step="5">
          </div>
        </div>
        <button class="scatter-remove" data-scatter-remove="${i}" title="Remove">×</button>
      </div>`).join('')}
    ${library.length ? `
    <div class="scatter-library">
      <div class="scatter-library-label">From library - click to add</div>
      <div class="scatter-library-grid">
        ${library.map(path => `<button class="scatter-lib-btn" data-scatter-lib="${escapeAttr(path)}" title="${escapeAttr(path.split('/').pop())}" style="background-image:url('${escapeAttr(path)}')"></button>`).join('')}
      </div>
    </div>` : ''}
    <button class="add-item-btn" data-scatter-add>+ Add custom (upload)</button>
  </div>
</div>`;
}

function textField(label, key, value) {
  return `<div class="field"><label>${escapeHTML(label)}</label><input type="text" data-key="${escapeAttr(key)}" value="${escapeAttr(value || '')}"></div>`;
}
// Read-only field that pulls its value from the Matrix (the source of truth
// for game-info numbers). Greyed out + a short note so it's obvious the value
// is centrally managed.
function lockedFromMatrixField(label, value) {
  return `<div class="field field-locked">
    <label>${escapeHTML(label)} <span class="locked-tag">matrix</span></label>
    <input type="text" value="${escapeAttr(value || '')}" disabled tabindex="-1">

function textareaField(label, key, value) {
  return `<div class="field"><label>${escapeHTML(label)}</label><textarea data-key="${escapeAttr(key)}" rows="3">${escapeHTML(value || '')}</textarea></div>`;
}
function imageField(label, key, value) {

  <div class="img-pad ${value ? 'has-image' : ''}" style="${value ? `background-image:url('${value}')` : ''}" data-img-pad="${escapeAttr(key)}"></div>

}
function bulletsField(label, key, values) {

  <div class="bullets-edit" data-bullets="${escapeAttr(key)}">
    ${values.map((v, i) => `
      <div class="bullet-row">

    <button class="add-item-btn" data-bullet-add>+ Add bullet</button>

function idsHeadersField(label, key, values) {
  return `
<div class="field">
  <label>${escapeHTML(label)}</label>
  <div style="display:grid; grid-template-columns: repeat(4, 1fr); gap:4px;">
    ${[0,1,2,3].map(i => `<input type="text" data-idsheader-i="${i}" value="${escapeAttr(values[i] || '')}">`).join('')}

}
function rtpRowsField(label, key, rows) {
  return `
<div class="field">
  <label>${escapeHTML(label)}</label>
  <div class="rtp-rows" data-rtprows>
    ${rows.map((r, i) => `
      <div class="rtp-row-edit" data-rtp-i="${i}">
        <input type="text" data-rtp-field="label" value="${escapeAttr(r.label || '')}" placeholder="Row label">
        ${[0,1,2,3].map(j => `<input type="text" data-rtp-field="value" data-rtp-vj="${j}" value="${escapeAttr((r.values||[])[j] || '')}">`).join('')}
        <button class="x" data-rtp-remove="${i}" title="Remove row">×</button>
      </div>`).join('')}
    <button class="add-item-btn" data-rtp-add>+ Add RTP row</button>
  </div>

function listField(f, items) {
  return `
<div class="field">
  <label>${escapeHTML(f.label)}</label>
  <div class="item-list" data-list="${escapeAttr(f.key)}" data-item-fields='${escapeAttr(JSON.stringify(f.itemFields))}'>
    ${items.map((it, i) => `
      <div class="item-card" data-item-i="${i}">
        <div class="item-head">
          <span class="item-title">${escapeHTML(f.itemLabel || 'Item')} ${i + 1}</span>
          <span class="item-actions">
            <button data-item-act="up" data-item-i="${i}">↑</button>
            <button data-item-act="down" data-item-i="${i}">↓</button>
            <button data-item-act="remove" data-item-i="${i}" class="danger">×</button>
          </span>

        ${f.itemFields.map(ff => renderItemField(ff, it, i)).join('')}
      </div>`).join('')}
    <button class="add-item-btn" data-list-add="${escapeAttr(f.key)}">+ Add ${escapeHTML(f.itemLabel || 'item').toLowerCase()}</button>

function renderItemField(f, item, i) {
  const v = item[f.key];
  const key = `item.${i}.${f.key}`;
  if (f.type === 'text')     return textField(f.label, key, v);
  if (f.type === 'textarea') return textareaField(f.label, key, v);
  if (f.type === 'image')    return imageField(f.label, key, v);
  return '';
}

function renderAddSectionBar() {
  return `
<div class="add-section-bar" id="add-section-bar">
  <button class="add-section-btn" id="add-section-btn">+ Add section</button>
  <div class="add-section-pop">
    ${Object.entries(SECTION_TYPES).map(([type, def]) => `
      <button data-add-section="${type}"><span>${def.icon}</span> ${escapeHTML(def.label)}</button>`).join('')}
  </div>
</div>`;
